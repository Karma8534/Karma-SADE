r ngrok endpoints.\",\"href\":\"/universal-gateway/custom-domains\"},{\"title\":\"Region \u0026 IP Resolution\",\"sidebarTitle\":\"Region \u0026 IP Resolution\",\"description\":\"Customize where your traffic physically connects to ngrok's network, to meet data residency needs (such as keeping data within the EU).\",\"href\":\"/universal-gateway/region-pinning\"}]},{\"title\":\"IP Addresses\",\"description\":\"Learn about ngrok's dynamic IP addresses, dedicated IPs, IPv6 support, and global load balancing for endpoints and agent connections.\",\"href\":\"/universal-gateway/ip-addresses\"},{\"title\":\"Dedicated IPs\",\"description\":\"Configure static, dedicated IP addresses for your domains and agent connections, exclusively assigned to your account.\",\"tag\":\"Coming Soon\",\"href\":\"/universal-gateway/dedicated-ips\"},{\"title\":\"TCP Addresses\",\"description\":\"Learn how to create and manage TCP addresses, enabling you to use fixed hostnames and ports for your TCP endpoints.\",\"href\":\"/universal-gateway/tcp-addresses\"},{\"title\":\"TLS Certificates\",\"description\":\"Learn how ngrok manages TLS certificates automatically, or how you can manually configure them yourself.\",\"href\":\"/universal-gateway/tls-certificates\"},{\"title\":\"TLS Termination\",\"description\":\"Learn how ngrok automatically handles TLS termination for you, and enables you to manage it yourself.\",\"href\":\"/universal-gateway/tls-termination\"},{\"title\":\"DDoS Protection\",\"description\":\"Learn about ngrok's automatic DDoS protection features that protect your endpoints from distributed denial of service attacks.\",\"href\":\"/universal-gateway/ddos-protection\"},{\"title\":\"Global Load Balancer\",\"description\":\"Learn about ngrok's Global Load Balancer for distributing traffic to the nearest healthy point of presence for improved performance.\",\"href\":\"/universal-gateway/global-load-balancer\"}]},{\"group\":\"Traffic Policy Features\",\"pages\":[{\"title\":\"Using Vaults \u0026 Secrets with Traffic Policy\",\"sidebarTitle\":\"Vaults \u0026 Secrets\",\"description\":\"Store sensitive data in encrypted vaults and reference them dynamically in your Traffic Policies.\",\"href\":\"/traffic-policy/secrets\"},{\"title\":\"Traffic Identities\",\"description\":\"Learn about Traffic Identities and Sessions for managing authenticated users via OAuth, OIDC, and SAML Traffic Policy actions.\",\"href\":\"/traffic-policy/identities\"},{\"title\":\"IP Policies\",\"sidebarTitle\":\"IP Policies\",\"description\":\"Use rules to allow or deny traffic and dashboard access from specific IPs and CIDRs.\",\"href\":\"/traffic-policy/concepts/ip-policies\"}]},{\"group\":\"Examples\",\"pages\":[{\"title\":\"Universal Gateway Examples\",\"sidebarTitle\":\"Overview\",\"description\":\"Browse examples and patterns for using ngrok's Universal Gateway including API gateway patterns, multicloud failover, and integrations.\",\"href\":\"/universal-gateway/examples\"},{\"title\":\"Implement the 'Front Door' Pattern\",\"sidebarTitle\":\"The Front Door Pattern\",\"description\":\"By using Cloud Endpoint and internal Agent Endpoints together, you loosely double your gateway and services for extra flexibility.\",\"href\":\"/universal-gateway/examples/front-door-pattern\"},{\"title\":\"Multiplex to Internal Services from a Single Domain\",\"sidebarTitle\":\"Multiplex to Internal Services\",\"description\":\"Dynamically serve any number of API or web app services from a single fully qualified domain name (FQDN) without complex networking configurations.\",\"href\":\"/universal-gateway/examples/multiplex\"},{\"title\":\"Deploy Custom Error Pages\",\"sidebarTitle\":\"Custom Error Pages\",\"description\":\"Instead of a blank page or HTTP error code, ensure your services automatically failover to error pages with clear details and instructions.\",\"href\":\"/universal-gateway/examples/custom-error-pages\"},{\"title\":\"Self-Hosted PaaS Alternative Gateway\",\"description\":\"Get the polish of managed platforms like Heroku or Vercel while maintaining full control over your infrastructure with load balancing, security, and observability.\",\"sidebar_label\":\"Self-Hosted PaaS Alternative\",\"href\":\"/universal-gateway/examples/paas-alternative-gateway\"},{\"title\":\"Agent-Assisted Gateway\",\"description\":\"Transform your local development environment into a production-ready testbed with real authentication, traffic transformation, and public accessibility for AI-assisted development.\",\"sidebar_label\":\"Agent-Assisted Gateway\",\"href\":\"/universal-gateway/examples/agent-assisted-gateway\"},{\"title\":\"Microservices API Gateway\",\"description\":\"Coordinate ingress traffic for microservices without a full service mesh, using ngrok to handle north-south traffic patterns with authentication and routing.\",\"sidebar_label\":\"Microservices Gateway\",\"href\":\"/universal-gateway/examples/microservices-gateway\"},{\"title\":\"Webhook Gateway\",\"description\":\"Centralize webhook validation and routing from third-party providers like Stripe, Twilio, and Slack to secure your integrations and eliminate repetitive implementation.\",\"sidebar_label\":\"Webhook Gateway\",\"href\":\"/universal-gateway/examples/webhook-gateway\"},{\"title\":\"Database Gateway\",\"description\":\"Securely expose databases to external clients with strict authentication, rate limiting, and query transformation to prevent runaway costs and data leaks.\",\"sidebar_label\":\"Database Gateway\",\"href\":\"/universal-gateway/examples/database-gateway\"},{\"title\":\"Access CI/CD Deploy Previews on Secure URLs\",\"sidebarTitle\":\"Ephemeral Workloads\",\"description\":\"Expose deploy previews and CI test environments on secure, short-lived URLs with ngrok endpoints and Traffic Policy.\",\"href\":\"/universal-gateway/examples/ephemeral-workloads\"},{\"title\":\"Switch Traffic Between Blue-Green Deployments\",\"sidebarTitle\":\"Blue-Green Deployments\",\"description\ uests on your endpoints before they make it to your upstream service.\",\"href\":\"/traffic-policy/actions/deny\"},{\"title\":\"Forward Internal Action\",\"sidebarTitle\":\"Forward Internal\",\"description\":\"The Forward Internal action enables you to forward traffic from an endpoint to a internal endpoint within the same ngrok account.\",\"href\":\"/traffic-policy/actions/forward-internal\"},{\"title\":\"HTTP Request Action\",\"sidebarTitle\":\"HTTP Request\",\"description\":\"The HTTP Request action performs an outbound HTTP request to a target URL.\",\"href\":\"/traffic-policy/actions/http-request\"},{\"title\":\"JWT Validation Action\",\"sidebarTitle\":\"JWT Validation\",\"description\":\"Validate JSON Web Tokens (JWT) on your endpoints before routing traffic to your upstream service.\",\"href\":\"/traffic-policy/actions/jwt-validation\"},{\"title\":\"Log Action\",\"sidebarTitle\":\"Log\",\"description\":\"The Log action enables you to log metadata to ngrok's eventing system.\",\"href\":\"/traffic-policy/actions/log\"},{\"title\":\"OAuth Action\",\"sidebarTitle\":\"OAuth\",\"description\":\"The OAuth action restricts access to only authorized users by enforcing OAuth through an identity provider of your choice.\",\"href\":\"/traffic-policy/actions/oauth\"},{\"title\":\"OpenID Connect Action\",\"sidebarTitle\":\"OpenID Connect (OIDC)\",\"description\":\"The OpenID Connect (OIDC) action restricts access to only authorized users by enforcing OIDC through an identity provider of your choice.\",\"href\":\"/traffic-policy/actions/oidc\"},{\"title\":\"OWASP CRS Request Action\",\"sidebarTitle\":\"OWASP CRS Request\",\"description\":\"Block common web attacks with the `owasp-crs-request` action in Traffic Policy.\",\"href\":\"/traffic-policy/actions/owasp-crs-request\"},{\"title\":\"OWASP CRS Response Action\",\"sidebarTitle\":\"OWASP CRS Response\",\"description\":\"Block common web attacks with the `owasp-crs-response` action in Traffic Policy.\",\"href\":\"/traffic-
