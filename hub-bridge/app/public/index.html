<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Karma Window v0.1</title>
  <style>
    :root{
      --border:#1f2a37;
      --muted:#9aa4b2;
      --bg:#0b0f14;
      --panel:#0f1620;
      --panel2:#0c121b;
      --text:#e5e7eb;
      --bgA:#0f172a;
      --bgU:#111827;
      --mono:#0a0f16;
      --dash:#223043;
      --btn:#0b1220;
      --btn2:#111a2b;
      --link:#93c5fd;
    }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{
      display:grid;
      grid-template-columns:minmax(520px, 2.2fr) minmax(340px, 1fr);
      height:100dvh;
      overflow:hidden;
      background:var(--bg);
    }
    .left{
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
      background:var(--panel2);
    }
    .right{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
      overflow:auto;
      min-width:0;
      background:var(--panel);
    }
    .topbar{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      background:var(--panel2);
    }
    .pill{
      font-size:12px;
      padding:4px 8px;
      border:1px solid var(--border);
      border-radius:999px;
      white-space:nowrap;
      background:rgba(255,255,255,0.02);
      color:var(--text);
    }
    .small{font-size:12px;color:var(--muted)}
    .tok{
      font-size:12px;
      padding:6px 8px;
      border:1px solid var(--border);
      border-radius:10px;
      min-width:220px;
      flex:1 1 240px;
      background:rgba(255,255,255,0.03);
      color:var(--text);
      outline:none;
    }
    .tok::placeholder{color:rgba(229,231,235,0.45)}
    .log{
      flex:1;
      overflow:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      background:var(--panel2);
    }
    .msg{
      max-width:78%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      white-space:pre-wrap;
      word-break:break-word;
      box-shadow:0 0 0 1px rgba(0,0,0,0.1) inset;
    }
    .msg img.thumb{
      display:block;
      max-width:200px;
      max-height:140px;
      border-radius:8px;
      margin-bottom:6px;
      border:1px solid var(--border);
    }
    .u{align-self:flex-end;background:var(--bgU)}
    .a{align-self:flex-start;background:var(--bgA)}
    .input{
      border-top:1px solid var(--border);
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
      background:var(--panel2);
    }
    .input-row{
      display:flex;
      gap:8px;
      align-items:flex-end;
    }
    #imgPreview{
      display:none;
      align-items:center;
      gap:8px;
      padding:4px 2px;
    }
    #imgPreview img{
      max-height:60px;
      max-width:100px;
      border-radius:6px;
      border:1px solid var(--border);
    }
    #imgPreview button{
      font-size:11px;
      padding:3px 8px;
      border-radius:6px;
      color:#f87171;
      border-color:#4b2222;
    }
    textarea{
      flex:1;
      min-height:44px;
      max-height:140px;
      resize:vertical;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      font:inherit;
      line-height:1.2;
      background:rgba(255,255,255,0.03);
      color:var(--text);
      outline:none;
    }
    textarea::placeholder{color:rgba(229,231,235,0.45)}
    button{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--text);
      cursor:pointer;
      font:inherit;
    }
    button:hover{background:var(--btn2)}
    button:disabled{opacity:.5;cursor:not-allowed}
    .promote-btn{
      background:#5b2fa8;
      color:#fff;
      border:1px solid #7c52cc;
      font-weight:700;
      letter-spacing:.04em;
      padding:6px 14px;
      border-radius:8px;
      white-space:nowrap;
    }
    .promote-btn:hover{background:#7040c0}
    .card{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      min-width:0;
      background:rgba(255,255,255,0.02);
    }
    .card h3{margin:0 0 8px 0;font-size:14px;color:var(--text)}
    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
      max-height:34dvh;
      overflow:auto;
      border:1px dashed var(--dash);
      padding:8px;
      border-radius:10px;
      background:var(--mono);
      color:var(--text);
    }
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .row button{padding:6px 10px;border-radius:10px}
    .hint{font-size:12px;color:var(--muted)}
    @media (max-width: 1100px){
      .wrap{grid-template-columns:1fr; height:auto; min-height:100dvh}
      .left{border-right:none; border-bottom:1px solid var(--border); height:70dvh}
      .right{height:30dvh}
      .mono{max-height:16dvh}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="topbar">
      <div class="pill" id="statusPill">status: loading&hellip;</div>
      <button class="promote-btn" id="promoteBtnTop">PROMOTE</button>
      <div class="pill" id="trustPill">trust: &mdash;</div>
      <div class="pill small" id="ckptPill">ckpt: &mdash;</div>
      <input class="tok" id="tok" placeholder="paste token once (stored locally)" />
      <button id="saveTok" style="padding:6px 10px">Save</button>
      <button id="clearTok" style="padding:6px 10px">Clear</button>
      <span class="hint" id="tokHint"></span>
    </div>
    <div class="log" id="log"></div>
    <div class="input">
      <div id="imgPreview">
        <img id="previewThumb" src="" alt="attached"/>
        <span class="small" id="previewName"></span>
        <button id="clearImg">&#10005; remove</button>
      </div>
      <div class="input-row">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none"/>
        <button id="attachBtn" title="Attach image (or paste screenshot)">&#128247;</button>
        <textarea id="msg" placeholder="Message Karma&hellip; (Enter to send, Shift+Enter for new line, or paste a screenshot)"></textarea>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="card">
      <h3>Trust / Resurrection</h3>
      <div class="mono" id="trustBlock">(loading)</div>
      <div class="row" style="margin-top:8px">
        <button id="refresh">Refresh</button>
        <button class="promote-btn" id="promoteBtn">PROMOTE</button>
      </div>
      <div id="candidatePanel" style="margin-top:8px;display:none">
        <div style="font-size:12px;color:#9aa4b2;margin-bottom:4px">Pending review — check to approve</div>
        <div id="candidateList" style="max-height:140px;overflow:auto;border:1px dashed var(--dash);border-radius:8px;padding:4px 6px;background:var(--mono);margin-bottom:6px"></div>
        <div class="row">
          <button class="promote-btn" id="approveSelectedBtn">Approve Selected</button>
          <span class="hint" id="approveNote"></span>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>Resume Prompt</h3>
      <div class="row" style="margin-bottom:8px">
        <button id="copyResume">Copy</button>
        <span class="hint" id="copyNote"></span>
      </div>
      <div class="mono" id="resumeBlock">(loading)</div>
    </div>
  </div>
</div>
<script>
const headers = {};
function getToken(){ return localStorage.getItem('HUB_CHAT_TOKEN') || ''; }
function setAuthHeader(){
  const t=getToken();
  if(t){ headers['Authorization']='Bearer '+t; }
  else { delete headers['Authorization']; }
}
setAuthHeader();
const logEl = document.getElementById('log');

// ── Image state ────────────────────────────────────────────────────────────
let _imgB64 = '';
let _imgMediaType = 'image/png';
function setImage(b64, mediaType, name){
  _imgB64 = b64;
  _imgMediaType = mediaType || 'image/png';
  const prev = document.getElementById('imgPreview');
  const thumb = document.getElementById('previewThumb');
  const nameEl = document.getElementById('previewName');
  thumb.src = 'data:' + _imgMediaType + ';base64,' + b64;
  nameEl.textContent = name || 'image';
  prev.style.display = 'flex';
}
function clearImage(){
  _imgB64 = '';
  _imgMediaType = 'image/png';
  const prev = document.getElementById('imgPreview');
  const thumb = document.getElementById('previewThumb');
  thumb.src = '';
  document.getElementById('previewName').textContent = '';
  prev.style.display = 'none';
  document.getElementById('fileInput').value = '';
}
function fileToB64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const result = reader.result; // "data:image/png;base64,..."
      const comma = result.indexOf(',');
      resolve({ b64: result.slice(comma+1), mediaType: file.type || 'image/png', name: file.name });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function addMsg(role, text, imgB64, imgMediaType){
  const d=document.createElement('div');
  d.className='msg ' + (role==='user'?'u':'a');
  if(imgB64){
    const im=document.createElement('img');
    im.className='thumb';
    im.src='data:'+(imgMediaType||'image/png')+';base64,'+imgB64;
    d.appendChild(im);
  }
  const t=document.createTextNode(text);
  d.appendChild(t);
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}
function setPromoteLabel(n, hasConflicts){
  const label = n > 0 ? `PROMOTE (${n}${hasConflicts ? ' ⚠' : ''})` : 'PROMOTE';
  const b1=document.getElementById('promoteBtnTop');
  const b2=document.getElementById('promoteBtn');
  if(!b1.disabled) b1.textContent=label;
  if(!b2.disabled) b2.textContent=label;
}
async function refreshCandidates(){
  try{
    const r = await fetch('/v1/candidates/list', { headers });
    if(!r.ok) return;
    const j = await r.json();
    const panel = document.getElementById('candidatePanel');
    const listEl = document.getElementById('candidateList');
    const candidates = j.candidates || [];
    const pending = candidates.filter(c=>!c.promoted);
    const conflicts = pending.filter(c=>c.lane==='conflict');
    setPromoteLabel(pending.length, conflicts.length > 0);
    if(pending.length === 0){ panel.style.display='none'; return; }
    panel.style.display='block';
    // Render checkboxes: conflicts unchecked by default (require explicit approval)
    listEl.innerHTML = pending.map(c=>{
      const isConflict = c.lane==='conflict';
      const flag = isConflict ? ' \u26a0 CONFLICT' : '';
      const checked = isConflict ? '' : 'checked';
      const clr = isConflict ? '#f87171' : '#e5e7eb';
      return `<label style="display:block;font-size:11px;padding:2px 4px;cursor:pointer;color:${clr}">` +
        `<input type="checkbox" value="${c.uuid}" ${checked} style="margin-right:5px;cursor:pointer">` +
        `[${c.lane}${flag}] ${c.name} <span style="color:#9aa4b2">(conf:${c.confidence})</span>` +
        `</label>`;
    }).join('');
  }catch(e){ /* non-fatal */ }
}
async function doApproveSelected(){
  const btn = document.getElementById('approveSelectedBtn');
  const noteEl = document.getElementById('approveNote');
  const checkboxes = document.querySelectorAll('#candidateList input[type=checkbox]:checked');
  const approvedUuids = Array.from(checkboxes).map(cb => cb.value);
  if(approvedUuids.length === 0){
    noteEl.textContent = 'nothing checked';
    setTimeout(()=>noteEl.textContent='', 1500);
    return;
  }
  btn.disabled = true;
  const origLabel = btn.textContent;
  btn.textContent = '\u2026';
  try{
    const r = await fetch('/v1/candidates/promote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...headers },
      body: JSON.stringify({ approved_uuids: approvedUuids, authorized_by: 'Colby', reason: 'manual_review' }),
    });
    const j = await r.json();
    if(!j.ok) throw new Error(JSON.stringify(j));
    addMsg('assistant', `GATE: ${j.promoted_count} approved \u2192 canonical (${j.skipped_count} remain pending)`);
    noteEl.textContent = `${j.promoted_count} promoted`;
    setTimeout(()=>noteEl.textContent='', 2000);
    await refreshState();
  }catch(e){
    addMsg('assistant', 'GATE ERROR: ' + String(e));
  }finally{
    btn.disabled = false;
    btn.textContent = origLabel;
  }
}
async function refreshState(){
  try{
    const r = await fetch('/v1/checkpoint/latest', { headers });
    document.getElementById('statusPill').textContent = 'status: ' + r.status;
    const j = await r.json();
    if(!j.ok){ throw new Error(JSON.stringify(j)); }
    const lines = (j.resume_prompt || '').split('\n');
    const head = lines.slice(0, 8).join('\n');
    document.getElementById('trustBlock').textContent = head;
    document.getElementById('resumeBlock').textContent = j.resume_prompt || '';
    const trustLine = lines.find(x=>x.startsWith('trust_level:')) || 'trust_level: \u2014';
    const ckptLine = lines.find(x=>x.startsWith('checkpoint_id:')) || 'checkpoint_id: \u2014';
    document.getElementById('trustPill').textContent = trustLine.replace('trust_level:','trust:').trim();
    document.getElementById('ckptPill').textContent = ckptLine.replace('checkpoint_id:','ckpt:').trim();
  }catch(e){
    document.getElementById('statusPill').textContent='status: error';
    document.getElementById('trustBlock').textContent=String(e);
    document.getElementById('resumeBlock').textContent='';
  }
  await refreshCandidates();
}
async function sendMsg(){
  const ta=document.getElementById('msg');
  const text=ta.value.trim();
  if(!text && !_imgB64) return;
  ta.value='';
  ta.disabled=true;
  const sentImg = _imgB64, sentMT = _imgMediaType;
  addMsg('user', text || '(image)', sentImg, sentMT);
  clearImage();
  const payload = { message: text || '(describe this image)', mode: 'default' };
  if(sentImg){ payload.image_b64 = sentImg; payload.media_type = sentMT; }
  try{
    const r=await fetch('/v1/chat', {
      method:'POST',
      headers: { 'Content-Type':'application/json', ...headers },
      body: JSON.stringify(payload)
    });
    const j=await r.json();
    if(!j || j.ok===false){ throw new Error(JSON.stringify(j)); }
    const reply = j.assistant_text || j.reply || j.message || JSON.stringify(j);
    addMsg('assistant', reply);
    await refreshState();
  }catch(e){
    addMsg('assistant', 'ERROR: ' + String(e));
  }finally{
    ta.disabled=false;
    ta.focus();
  }
}
document.getElementById('refresh').onclick=refreshState;
document.getElementById('approveSelectedBtn').onclick=doApproveSelected;
async function doPromote(){
  const btn1=document.getElementById('promoteBtnTop');
  const btn2=document.getElementById('promoteBtn');
  const orig1=btn1.textContent, orig2=btn2.textContent;
  btn1.disabled=true; btn1.textContent='…';
  btn2.disabled=true; btn2.textContent='…';
  const next = prompt("next_action for checkpoint (optional):") || "";
  try {
    const r = await fetch("/v1/promote", {
      method: "POST",
      headers: { "Content-Type": "application/json", ...headers },
      body: JSON.stringify({ n: 50, reason: "ui", next_action: next })
    });
    const j = await r.json();
    if (!j.ok) throw new Error(JSON.stringify(j));
    addMsg("assistant", "PROMOTE ok: " + (j.checkpoint_id || "(no checkpoint_id)"));
    await refreshState();
  } catch(e) {
    addMsg("assistant", "PROMOTE ERROR: " + String(e));
  } finally {
    btn1.disabled=false; btn1.textContent=orig1;
    btn2.disabled=false; btn2.textContent=orig2;
  }
}
document.getElementById('promoteBtnTop').onclick=doPromote;
document.getElementById('promoteBtn').onclick=doPromote;

document.getElementById('copyResume').onclick=async ()=>{
  const text=document.getElementById('resumeBlock').textContent;
  await navigator.clipboard.writeText(text);
  const n=document.getElementById('copyNote');
  n.textContent='copied';
  setTimeout(()=>n.textContent='', 1200);
};
document.getElementById('saveTok').onclick=()=>{
  const v=(document.getElementById('tok').value||'').trim();
  if(v){ localStorage.setItem('HUB_CHAT_TOKEN', v); document.getElementById('tok').value=''; }
  setAuthHeader();
  document.getElementById('tokHint').textContent='saved';
  setTimeout(()=>document.getElementById('tokHint').textContent='', 1200);
  refreshState();
};
document.getElementById('clearTok').onclick=()=>{
  localStorage.removeItem('HUB_CHAT_TOKEN');
  setAuthHeader();
  document.getElementById('tokHint').textContent='cleared';
  setTimeout(()=>document.getElementById('tokHint').textContent='', 1200);
  refreshState();
};
document.getElementById('msg').addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});

// ── Image attach: file picker ──────────────────────────────────────────────
document.getElementById('attachBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').addEventListener('change', async(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const {b64, mediaType, name} = await fileToB64(file);
    setImage(b64, mediaType, name);
  }catch(err){ addMsg('assistant','IMAGE ERROR: '+String(err)); }
});
document.getElementById('clearImg').onclick=clearImage;

// ── Image attach: paste from clipboard ────────────────────────────────────
document.getElementById('msg').addEventListener('paste', async(e)=>{
  const items = e.clipboardData?.items;
  if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file = item.getAsFile();
      if(!file) continue;
      try{
        const {b64, mediaType} = await fileToB64(file);
        setImage(b64, mediaType, 'pasted-image');
      }catch(err){ addMsg('assistant','PASTE ERROR: '+String(err)); }
      break;
    }
  }
});

refreshState();
</script>
</body>
</html>
