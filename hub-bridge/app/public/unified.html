<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080810;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Gate ─────────────────────────────────────────────────────────────── */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 14px;
  }
  #gate .gate-mark { font-size: 11px; letter-spacing: 6px; color: #6d28d9; text-transform: uppercase; margin-bottom: 4px; }
  #gate h1 { font-size: 28px; color: #a78bfa; letter-spacing: 8px; font-weight: 300; }
  #gate .gate-sub { color: #4b5563; font-size: 11px; letter-spacing: 2px; }
  #gate input {
    background: #0e0e1a; border: 1px solid #2d2040; color: #e2e8f0;
    padding: 9px 14px; width: 420px; font-family: monospace; font-size: 13px;
    outline: none; margin-top: 12px;
  }
  #gate input:focus { border-color: #6d28d9; }
  #gate input::placeholder { color: #2d2040; }
  #gate button {
    background: #6d28d9; color: #e2e8f0; border: none; padding: 9px 28px;
    cursor: pointer; font-family: monospace; font-size: 13px; font-weight: bold;
    letter-spacing: 2px; transition: background 0.15s;
  }
  #gate button:hover { background: #7c3aed; }
  #gate .err { color: #ef4444; font-size: 12px; display: none; }

  /* ── App shell ────────────────────────────────────────────────────────── */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* ── Header ───────────────────────────────────────────────────────────── */
  #header {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 20px; background: #080810;
    border-bottom: 1px solid #1a1030; flex-shrink: 0;
  }
  #header .karma-badge { display: flex; flex-direction: column; gap: 1px; }
  #header .karma-title { color: #a78bfa; font-size: 18px; letter-spacing: 6px; font-weight: 300; }
  #header .karma-sub   { color: #4b5563; font-size: 10px; letter-spacing: 3px; }
  #header .spacer { flex: 1; }
  #status-bar { display: flex; gap: 20px; align-items: center; }
  .stat-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4b5563; }
  .stat-label { color: #4b5563; }
  .stat-val   { color: #8b5cf6; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: #374151; flex-shrink: 0; }
  .stat-dot.alive { background: #7c3aed; box-shadow: 0 0 6px #7c3aed; }
  .stat-dot.warn  { background: #f59e0b; }
  .stat-dot.dead  { background: #374151; }
  .hdr-btn {
    background: none; border: 1px solid #2d2040; color: #4b5563;
    padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 10px;
    letter-spacing: 1px; transition: all 0.15s;
  }
  .hdr-btn:hover { border-color: #6d28d9; color: #a78bfa; }
  .hdr-btn.active { border-color: #6d28d9; color: #a78bfa; background: #1a0a2e; }

  /* ── Main layout ──────────────────────────────────────────────────────── */
  #main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* ── Chat feed ────────────────────────────────────────────────────────── */
  #chat-feed {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: #1a1030 transparent;
  }
  #chat-feed::-webkit-scrollbar { width: 4px; }
  #chat-feed::-webkit-scrollbar-thumb { background: #1a1030; border-radius: 2px; }

  /* Agora panel removed — bus traffic lives at /agora only */

  /* ── Cascade panel ────────────────────────────────────────────────────── */
  #cascade-panel {
    display: none; padding: 8px 20px; background: #050508;
    border-bottom: 1px solid #1a1030; font-size: 10px; color: #4b5563;
    flex-shrink: 0; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  #cascade-panel.open { display: flex; }
  .cascade-node { display: flex; align-items: center; gap: 4px; }
  .cascade-node .cn-dot { width: 5px; height: 5px; border-radius: 50%; background: #374151; }
  .cascade-node .cn-dot.alive { background: #7c3aed; box-shadow: 0 0 4px #7c3aed; }
  .cascade-arrow { color: #2a2a4a; margin: 0 2px; }

  /* ── Messages ─────────────────────────────────────────────────────────── */
  .msg { display: flex; flex-direction: column; gap: 3px; max-width: 820px; }
  .msg.user    { align-self: flex-end; }
  .msg.karma, .msg.regent, .msg.cc, .msg.codex { align-self: flex-start; }

  .msg-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; }
  .msg.user .msg-meta { color: #374151; justify-content: flex-end; }
  .msg-sender { letter-spacing: 2px; font-weight: bold; }

  .msg.karma  .msg-sender { color: #8b5cf6; }
  .msg.regent .msg-sender { color: #6d6dcc; }
  .msg.cc     .msg-sender { color: #3b82f6; }
  .msg.codex  .msg-sender { color: #10b981; }
  .msg.user   .msg-sender { color: #4b5563; }
  .msg.system .msg-sender { color: #6b7280; }
  .msg-ts { color: #374151; }

  .msg-body {
    padding: 10px 14px; line-height: 1.6; font-size: 13px;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.karma  .msg-body { background: #0e0a1a; border: 1px solid #2d1f50; border-left: 3px solid #6d28d9; color: #e2e8f0; }
  .msg.regent .msg-body { background: #0a0a18; border: 1px solid #1f1f48; border-left: 3px solid #4040a0; color: #c4c4e0; }
  .msg.cc     .msg-body { background: #0a0f1a; border: 1px solid #1f2f48; border-left: 3px solid #2563eb; color: #bfcfe0; }
  .msg.codex  .msg-body { background: #0a1410; border: 1px solid #1f3828; border-left: 3px solid #059669; color: #b0d4c0; }
  .msg.user   .msg-body { background: #0a0a14; border: 1px solid #1f1f38; color: #9ca3af; }
  .msg.system .msg-body { background: #0a0a10; border: 1px solid #1a1a28; color: #6b7280; font-size: 11px; }

  /* Tool evidence (Tool evidence) */
  .msg.tool-evidence .msg-body {
    background: #0c0c18; border: 1px solid #1a1a3a; border-left: 3px solid #f59e0b;
    color: #9ca3af; font-size: 11px; font-family: 'JetBrains Mono', monospace;
  }
  .tool-name { color: #f59e0b; font-weight: 600; }
  .tool-input { color: #6b7280; }
  .tool-output { color: #a78bfa; max-height: 120px; overflow-y: auto; }
  .tool-toggle { cursor: pointer; color: #4b5563; font-size: 10px; }
  .tool-toggle:hover { color: #9ca3af; }

  /* Markdown rendering */
  .msg-body code { background: #1a1a2e; padding: 1px 4px; border-radius: 3px; font-size: 11px; color: #a78bfa; }
  .msg-body pre { background: #0c0c18; border: 1px solid #1a1a3a; border-radius: 4px; padding: 8px; margin: 6px 0; overflow-x: auto; }
  .msg-body pre code { background: none; padding: 0; color: #c4b5fd; }
  .msg-body strong { color: #e2e8f0; }
  .msg-body em { color: #cbd5e1; font-style: italic; }

  /* Copy button on each message */
  .msg-copy { position: absolute; top: 4px; right: 4px; background: none; border: none; cursor: pointer; opacity: 0; transition: opacity 0.15s; font-size: 11px; color: #4b5563; padding: 2px 5px; }
  .msg:hover .msg-copy { opacity: 0.6; }
  .msg-copy:hover { opacity: 1 !important; color: #a78bfa; }
  .msg-copy.copied { color: #22c55e; }
  .msg { position: relative; }

  /* Scroll arrows */
  .scroll-arrows { position: fixed; right: 16px; bottom: 80px; display: flex; flex-direction: column; gap: 6px; z-index: 100; }
  .scroll-arrow { background: #1a1a2e; border: 1px solid #2d1f50; color: #6d28d9; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
  .scroll-arrow:hover { background: #2d1f50; color: #a78bfa; }

  .msg-body.pending { color: #3b3b60; font-style: italic; animation: pulse 1.6s ease-in-out infinite; }

  /* Feedback */
  .feedback-btns { display: inline-flex; gap: 6px; margin-left: 8px; }
  .feedback-btns button {
    background: none; border: none; cursor: pointer; font-size: 12px;
    opacity: 0.35; transition: opacity 0.15s; padding: 0;
  }
  .feedback-btns button:hover, .feedback-btns button.active { opacity: 1; }
  .write-confirmed { color: #7c3aed; font-size: 10px; margin-left: 6px; }
  .feedback-note { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }
  .feedback-note textarea {
    background: #0e0e1a; border: 1px solid #2d2040; color: #e2e8f0;
    padding: 6px 10px; font-family: monospace; font-size: 12px;
    resize: vertical; min-height: 48px; outline: none;
  }
  .feedback-note textarea:focus { border-color: #6d28d9; }
  .feedback-note button {
    align-self: flex-end; background: #3b1f6a; color: #e2e8f0; border: none;
    padding: 4px 12px; cursor: pointer; font-family: monospace; font-size: 11px;
  }
  .feedback-note button:hover { background: #6d28d9; }

  /* Processing */
  #processing { display: none; align-self: flex-start; padding: 8px 14px; color: #5b21b6; font-size: 12px; letter-spacing: 1px; }
  #processing.visible { display: block; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  #processing { animation: pulse 1.4s ease-in-out infinite; }

  /* ── Input area ───────────────────────────────────────────────────────── */
  #input-area {
    padding: 12px 20px 14px; background: #080810;
    border-top: 1px solid #1a1030; flex-shrink: 0;
    display: flex; gap: 10px; align-items: flex-end;
  }
  #msg-input {
    flex: 1; background: #0e0e1a; border: 1px solid #2d2040; color: #e2e8f0;
    padding: 9px 12px; font-family: monospace; font-size: 13px;
    resize: none; min-height: 40px; max-height: 140px; outline: none; line-height: 1.5;
  }
  #msg-input:focus { border-color: #6d28d9; }
  #msg-input::placeholder { color: #2d2040; }
  #send-btn {
    background: #6d28d9; color: #e2e8f0; border: none; padding: 9px 20px;
    cursor: pointer; font-family: monospace; font-size: 12px; font-weight: bold;
    letter-spacing: 1px; transition: background 0.15s; flex-shrink: 0;
  }
  #send-btn:hover { background: #7c3aed; }
  #send-btn:disabled { opacity: 0.35; cursor: default; }
  #send-btn.stop-mode { background: #dc2626; letter-spacing: 2px; }
  #send-btn.stop-mode:hover { background: #ef4444; }

  /* ── Route hint + footer ──────────────────────────────────────────────── */
  #route-hint { font-size: 10px; color: #3a2a5a; padding: 0 20px 4px; flex-shrink: 0; }
  #route-hint span { margin-right: 14px; letter-spacing: 1px; }
  #route-hint .rh-target { color: #6d28d9; }
  #footer {
    padding: 6px 20px; background: #080810; border-top: 1px solid #0f0a1a;
    text-align: center; font-size: 10px; letter-spacing: 4px; color: #2d1f50; flex-shrink: 0;
  }
  #empty-state { color: #2a2a4a; font-size: 12px; text-align: center; margin-top: 40px; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- Gate -->
<div id="gate">
  <div class="gate-mark">Ascendant</div>
  <h1>KARMA</h1>
  <div class="gate-sub">Access token required</div>
  <input type="password" id="token-input" placeholder="hub token" autocomplete="off" />
  <button id="token-btn">ENTER</button>
  <div class="err" id="gate-err">Invalid token</div>
</div>

<!-- App -->
<div id="app">

  <div id="header">
    <div class="karma-badge">
      <div class="karma-title">KARMA</div>
      <div class="karma-sub">SovereignPeer &middot; Ascendant &middot; Always Present</div>
    </div>
    <div class="spacer"></div>
    <div id="status-bar">
      <div class="stat-item">
        <div class="stat-dot" id="heartbeat-dot"></div>
        <span class="stat-label">last seen</span>
        <span class="stat-val" id="last-seen-val">—</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" id="k2-dot"></div>
        <span class="stat-label">K2</span>
        <span class="stat-val" id="k2-val">—</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" id="brain-dot"></div>
        <span class="stat-label">brain</span>
        <span class="stat-val" id="brain-val">—</span>
      </div>
    </div>
    <button class="hdr-btn" id="cascade-btn">CASCADE</button>
    <button class="hdr-btn" id="agora-btn">AGORA</button>
    <button class="hdr-btn" id="clear-btn">CLEAR</button>
  </div>

  <div id="cascade-panel">
    <div class="cascade-node"><div class="cn-dot" id="cn-k2"></div><span>K2</span></div>
    <span class="cascade-arrow">&#8594;</span>
    <div class="cascade-node"><div class="cn-dot" id="cn-p1"></div><span>P1</span></div>
    <span class="cascade-arrow">&#8594;</span>
    <div class="cascade-node"><div class="cn-dot" id="cn-mini"></div><span>5.4-mini</span></div>
    <span class="cascade-arrow">&#8594;</span>
    <div class="cascade-node"><div class="cn-dot" id="cn-gpt54"></div><span>5.4</span></div>
    <span class="cascade-arrow">&#8594;</span>
    <div class="cascade-node"><div class="cn-dot" id="cn-sonnet"></div><span>Sonnet</span></div>
  </div>

  <div class="scroll-arrows">
    <button class="scroll-arrow" onclick="document.getElementById('chat-feed').scrollTo({top:0,behavior:'smooth'})" title="Scroll to top">&#9650;</button>
    <button class="scroll-arrow" onclick="document.getElementById('chat-feed').scrollTo({top:document.getElementById('chat-feed').scrollHeight,behavior:'smooth'})" title="Scroll to bottom">&#9660;</button>
  </div>

  <div id="main-layout">

    <div id="chat-feed">
      <div id="empty-state">Waiting for Karma...</div>
      <div id="processing">Karma is thinking...</div>
    </div>

    <!-- Agora panel removed — bus traffic at /agora only -->

  </div>

  <div id="route-hint">
    <span>default &#8594; <span class="rh-target">KARMA</span></span>
    <span>@regent &#8594; <span class="rh-target">REGENT</span></span>
    <span>@cc &#8594; <span class="rh-target">CC</span></span>
    <span>@codex &#8594; <span class="rh-target">CODEX</span></span>
  </div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Message Karma... (@cc @codex @regent → routes to AGORA)"></textarea>
    <button id="send-btn">SEND</button>
  </div>

  <div id="footer">Evolve. Continue.</div>

</div>

<script>
  const CHAT_URL     = '/v1/chat';
  const BUS_POST_URL = '/v1/coordination/post';
  const BUS_POLL_URL = '/v1/coordination/recent?limit=40';
  const POLL_MS      = 5000;
  const TOKEN_KEY    = 'hubToken';
  const CONV_KEY     = 'karmaConvId';
  const MSG_KEY      = 'karmaMessages';
  const BRAIN_KEY    = 'unifiedBrain';
  const BRAIN_TTL    = 60 * 60 * 1000; // 1 hour

  let hubToken       = null;
  let conversationId = localStorage.getItem(CONV_KEY) || crypto.randomUUID();
  let seenBusIds     = new Set();
  let pendingBus     = new Map();
  let lastActivityTs = null;
  let isStreaming    = false;
  let currentStreamMsgEl = null;
  let currentStreamText  = '';
  let streamToolMap  = new Map();

  localStorage.setItem(CONV_KEY, conversationId);

  // ── Auth ────────────────────────────────────────────────────────────────
  function init() {
    const saved = localStorage.getItem(TOKEN_KEY) || localStorage.getItem('karma_hub_token');
    if (saved) { hubToken = saved; localStorage.setItem(TOKEN_KEY, saved); showApp(); return; }
    document.getElementById('token-btn').addEventListener('click', submitToken);
    document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitToken(); });
  }

  async function submitToken() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) return;
    hubToken = val;
    try {
      const r = await fetch('/v1/coordination/recent?limit=1', { headers: auth() });
      if (r.status === 401 || r.status === 403) {
        document.getElementById('gate-err').style.display = 'block';
        hubToken = null; return;
      }
    } catch (_) {}
    localStorage.setItem(TOKEN_KEY, val);
    showApp();
  }

  function auth() { return { 'Authorization': 'Bearer ' + hubToken }; }

  function showApp() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('send-btn').addEventListener('click', () => { if (isStreaming) cancelGeneration(); else sendMessage(); });
    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      if (e.key === 'Escape' && isStreaming) { e.preventDefault(); cancelGeneration(); }
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && isStreaming) cancelGeneration(); });
    document.getElementById('agora-btn').addEventListener('click', toggleAgora);
    document.getElementById('cascade-btn').addEventListener('click', toggleCascade);
    document.getElementById('clear-btn').addEventListener('click', clearConversation);
    autoGrow(document.getElementById('msg-input'));
    loadSavedMessages();
    loadBrainContext();
    registerWebMCPTools();
    pollBus();
    setInterval(pollBus, POLL_MS);
    setInterval(updateHeartbeat, 15000);
  }

  async function loadBrainContext() {
    const dot = document.getElementById('brain-dot');
    const val = document.getElementById('brain-val');
    const cached = (() => { try { return JSON.parse(localStorage.getItem(BRAIN_KEY) || 'null'); } catch { return null; } })();
    const fresh = cached && (Date.now() - cached.ts < BRAIN_TTL);
    if (fresh) {
      dot.className = 'stat-dot online';
      val.textContent = 'restored';
      return cached.context;
    }
    try {
      dot.className = 'stat-dot';
      val.textContent = 'loading';
      const r = await fetch('/memory/context', { headers: auth() });
      if (!r.ok) throw new Error(r.status);
      const context = await r.json();
      localStorage.setItem(BRAIN_KEY, JSON.stringify({ context, ts: Date.now() }));
      dot.className = 'stat-dot online';
      val.textContent = 'live';
      return context;
    } catch (e) {
      dot.className = 'stat-dot offline';
      val.textContent = 'err';
      return null;
    }
  }

  function registerWebMCPTools() {
    if (!navigator.modelContext?.registerTool) return;
    navigator.modelContext.registerTool({
      name: 'search_memory',
      description: "Search Julian and Karma's shared memory for past decisions, patterns, and context",
      inputSchema: { type: 'object', properties: { query: { type: 'string' } }, required: ['query'] },
      execute: async ({ query }) => {
        const res = await fetch('/memory/search', { method: 'POST', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
        return { content: [{ type: 'text', text: await res.text() }] };
      }
    });
    navigator.modelContext.registerTool({
      name: 'post_to_bus',
      description: 'Post a message to the Family coordination bus',
      inputSchema: { type: 'object', properties: { content: { type: 'string' }, to: { type: 'string' } }, required: ['content'] },
      execute: async ({ content, to }) => {
        const res = await fetch('/v1/coordination/post', { method: 'POST', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify({ content, to: to || 'all', from: 'webmcp', type: 'inform', urgency: 'informational' }) });
        return { content: [{ type: 'text', text: await res.text() }] };
      }
    });
    navigator.modelContext.registerTool({
      name: 'get_context',
      description: 'Get current session state, active task, and cognitive trail from the memory spine',
      inputSchema: { type: 'object', properties: {} },
      execute: async () => {
        const res = await fetch('/memory/context', { headers: auth() });
        return { content: [{ type: 'text', text: await res.text() }] };
      }
    });
  }

  function autoGrow(el) {
    el.addEventListener('input', () => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; });
  }

  function toggleAgora() {
    window.open('/agora', '_blank');
  }

  function toggleCascade() {
    document.getElementById('cascade-panel').classList.toggle('open');
    document.getElementById('cascade-btn').classList.toggle('active');
  }

  // ── Routing ─────────────────────────────────────────────────────────────
  function parseTarget(text) {
    const m = text.match(/^@(\w+)\s*/i);
    if (!m) return { target: 'karma', text };
    const tag = m[1].toLowerCase();
    if (['cc', 'codex', 'regent'].includes(tag)) return { target: tag, text: text.slice(m[0].length).trim() };
    return { target: 'karma', text };
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const raw   = input.value.trim();
    if (!raw) return;
    const { target, text } = parseTarget(raw);
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    appendMsg('user', raw);
    hideEmpty();
    scrollBottom();
    if (target === 'karma') {
      await sendToKarma(text);
    } else {
      await sendToBus(target, text);
    }
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }

  // ── Karma: /v1/chat (streaming) ─────────────────────────────────────────
  async function sendToKarma(text) {
    const proc = document.getElementById('processing');
    proc.textContent = 'Karma is thinking...';
    proc.classList.add('visible');
    setStreamingState(true);
    currentStreamMsgEl = null;
    currentStreamText = '';
    streamToolMap.clear();
    scrollBottom();

    try {
      _streamAbortController = new AbortController();
      const res = await fetch(CHAT_URL, {
        method: 'POST',
        headers: { ...auth(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, conversation_id: conversationId, session_id: conversationId, stream: true }),
        signal: _streamAbortController.signal,
      });
      if (res.status === 401) { proc.classList.remove('visible'); setStreamingState(false); appendMsg('system', 'Token rejected.'); return; }

      // Non-streaming fallback (server returns JSON instead of SSE)
      const ct = res.headers.get('content-type') || '';
      if (!ct.includes('text/event-stream')) {
        const data = await res.json();
        proc.classList.remove('visible'); setStreamingState(false);
        if (data.tool_log?.length) for (const e of data.tool_log) appendToolEvidence(e.tool, e.input, e.output);
        const content = data.assistant_text || data.response || data.content || data.error || '(no response)';
        appendMsg('karma', content, data.write_id ?? null, data.canonical?.turn_id ?? null);
        lastActivityTs = new Date().toISOString(); updateHeartbeat();
        return;
      }

      // SSE streaming path
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (line.startsWith('data: ')) {
              try { handleStreamEvent(JSON.parse(line.slice(6))); } catch {}
            }
          }
        }
      }
      // Flush remaining buffer
      if (buffer.trim()) {
        for (const line of buffer.split('\n')) {
          if (line.startsWith('data: ')) {
            try { handleStreamEvent(JSON.parse(line.slice(6))); } catch {}
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError' && isStreaming) appendMsg('system', 'Error: ' + err.message);
    } finally {
      _streamAbortController = null;
      proc.classList.remove('visible');
      setStreamingState(false);
      saveMessages();
      lastActivityTs = new Date().toISOString();
      updateHeartbeat();
    }
  }

  let _streamAbortController = null;

  function handleStreamEvent(obj) {
    const type = obj.type;
    if (type === 'result') {
      // Stream complete — force close
      if (_streamAbortController) { try { _streamAbortController.abort(); } catch {} }
      document.getElementById('processing').classList.remove('visible');
      setStreamingState(false);
      saveMessages();
      lastActivityTs = new Date().toISOString();
      updateHeartbeat();
      return;
    }
    if (type === 'assistant') {
      const content = obj.message?.content || [];
      for (const block of content) {
        if (block.type === 'thinking') {
          document.getElementById('processing').textContent = 'Karma is reasoning...';
        } else if (block.type === 'tool_use') {
          if (!streamToolMap.has(block.id)) {
            const el = appendToolEvidence(block.name, block.input, '(running...)');
            streamToolMap.set(block.id, el);
            document.getElementById('processing').textContent = 'Running ' + block.name + '...';
            document.getElementById('processing').classList.add('visible');
          }
        } else if (block.type === 'text') {
          document.getElementById('processing').classList.remove('visible');
          if (!currentStreamMsgEl) {
            currentStreamMsgEl = appendMsg('karma', block.text || '');
            currentStreamText = block.text || '';
          } else {
            currentStreamText = block.text || currentStreamText;
            const bodyEl = currentStreamMsgEl.querySelector('.msg-body');
            if (bodyEl) bodyEl.innerHTML = renderMd(currentStreamText);
          }
          scrollBottom();
        }
      }
      return;
    }
    if (type === 'user') {
      const content = obj.message?.content || [];
      for (const block of content) {
        if (block.type === 'tool_result') {
          const toolEl = streamToolMap.get(block.tool_use_id);
          if (toolEl) {
            const outputEl = toolEl.querySelector('.tool-output');
            const result = obj.tool_use_result || {};
            const outputText = block.content || result.stdout || '';
            const truncated = outputText.length > 500 ? outputText.slice(0, 500) + '...' : outputText;
            if (outputEl) outputEl.textContent = truncated;
          }
          document.getElementById('processing').textContent = 'Karma is thinking...';
        }
      }
      return;
    }
    if (type === 'result') {
      // Stream complete — could extract cost/duration here if needed
      return;
    }
    if (type === 'error') {
      appendMsg('system', 'Error: ' + (obj.error || 'unknown'));
      return;
    }
  }

  function setStreamingState(active) {
    isStreaming = active;
    const btn = document.getElementById('send-btn');
    if (active) {
      btn.textContent = 'STOP';
      btn.classList.add('stop-mode');
      btn.disabled = false;
    } else {
      btn.textContent = 'SEND';
      btn.classList.remove('stop-mode');
      btn.disabled = false;
    }
  }

  async function cancelGeneration() {
    if (_streamAbortController) { try { _streamAbortController.abort(); } catch {} }
    try { await fetch('/v1/cancel', { headers: auth() }); } catch {}
    appendMsg('system', 'Cancelled');
    document.getElementById('processing').classList.remove('visible');
    setStreamingState(false);
    _streamAbortController = null;
  }

  // ── Bus: regent / cc / codex ────────────────────────────────────────────
  async function sendToBus(target, text) {
    // Bus responses live at /agora — show routing notice with link only
    appendMsg('system', '→ ' + target.toUpperCase() + ': "' + text.slice(0, 80) + (text.length > 80 ? '…' : '') + '" — sent to AGORA');
    scrollBottom();
    try {
      await fetch(BUS_POST_URL, {
        method: 'POST',
        headers: { ...auth(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: 'colby', to: target, type: 'inform', urgency: 'informational', content: text })
      });
    } catch (err) {
      appendMsg('system', 'Bus send failed: ' + err.message);
    }
  }

  // ── Polling ─────────────────────────────────────────────────────────────
  async function pollBus() {
    try {
      const r = await fetch(BUS_POLL_URL, { headers: auth() });
      if (!r.ok) return;
      const data = await r.json();
      const msgs = Array.isArray(data) ? data : (data.entries || data.messages || data.items || []);
      processBus(msgs);
    } catch (_) {}
  }

  function processBus(msgs) {
    if (!msgs.length) return;
    const sorted = [...msgs].sort((a, b) =>
      new Date(a.ts || a.timestamp || a.created_at || 0) - new Date(b.ts || b.timestamp || b.created_at || 0)
    );
    for (const msg of sorted) {
      const id = msg.id || msg.ts || msg.timestamp || JSON.stringify(msg).slice(0, 80);
      if (seenBusIds.has(id)) continue;
      seenBusIds.add(id);

      const from    = (msg.from || '').toLowerCase();
      const content = msg.content || msg.message || msg.text || '';
      const ts      = msg.ts || msg.timestamp || msg.created_at || null;

      const isAgent = ['regent', 'cc', 'codex', 'karma'].includes(from);
      if (isAgent) {
        lastActivityTs = ts || new Date().toISOString();
        updateHeartbeat();
        updateK2Status();
      }
    }
  }

  function resolvePending(from) {
    for (const [pid, info] of pendingBus.entries()) {
      const match = info.target === from || (from === 'karma' && info.target === 'regent');
      if (!match) continue;
      const el = info.el;
      if (el && el.parentNode) el.remove();
      pendingBus.delete(pid);
      return true;
    }
    return false;
  }

  // ── Rendering ───────────────────────────────────────────────────────────
  const SENDER_LABELS = { karma: 'KARMA', regent: 'REGENT', cc: 'CC', codex: 'CODEX', user: 'YOU', system: 'SYS' };

  function appendMsg(role, content, writeId, turnId) {
    const ts  = formatTs(new Date().toISOString());
    const lbl = SENDER_LABELS[role] || role.toUpperCase();
    const el  = document.createElement('div');
    el.className = 'msg ' + role;
    if (writeId) el.dataset.writeId = writeId;
    if (turnId)  el.dataset.turnId  = turnId;

    const hasFeedback = role !== 'user' && role !== 'system' && (writeId || turnId);
    const metaLeft  = role === 'user'
      ? '<span class="msg-ts">' + escHtml(ts) + '</span><span class="msg-sender">' + lbl + '</span>'
      : '<span class="msg-sender">' + lbl + '</span><span class="msg-ts">' + escHtml(ts) + '</span>';
    const fbHtml = hasFeedback
      ? '<span class="feedback-btns"><button class="up">&#x1F44D;</button><button class="down">&#x1F44E;</button></span>'
      : '';

    el.innerHTML =
      '<button class="msg-copy" title="Copy">&#x1F4CB;</button>' +
      '<div class="msg-meta">' + metaLeft + fbHtml + '</div>' +
      '<div class="msg-body">' + (role === 'user' ? escHtml(content) : renderMd(content)) + '</div>';

    // Copy button
    el.querySelector('.msg-copy').onclick = function() {
      navigator.clipboard.writeText(content).then(() => {
        this.textContent = '\u2713'; this.classList.add('copied');
        setTimeout(() => { this.innerHTML = '&#x1F4CB;'; this.classList.remove('copied'); }, 1500);
      });
    };

    if (hasFeedback) wireFeedback(el, writeId, turnId);

    const feed = document.getElementById('chat-feed');
    feed.insertBefore(el, document.getElementById('processing'));
    saveMessages();
    return el;
  }

  function appendToolEvidence(toolName, input, output) {
    const el = document.createElement('div');
    el.className = 'msg tool-evidence';
    const inputStr = typeof input === 'string' ? input : JSON.stringify(input || {});
    const outputStr = typeof output === 'string' ? output : JSON.stringify(output || {});
    const shortInput = inputStr.length > 120 ? inputStr.slice(0, 120) + '...' : inputStr;
    const shortOutput = outputStr.length > 200 ? outputStr.slice(0, 200) + '...' : outputStr;
    el.innerHTML =
      '<div class="msg-meta"><span class="msg-sender" style="color:#f59e0b">TOOL</span></div>' +
      '<div class="msg-body">' +
        '<span class="tool-name">' + escHtml(toolName) + '</span> ' +
        '<span class="tool-input">' + escHtml(shortInput) + '</span>' +
        '<div class="tool-output">' + escHtml(shortOutput) + '</div>' +
        (outputStr.length > 200 ? '<span class="tool-toggle" onclick="this.previousElementSibling.textContent=this.parentElement.dataset.fullOutput;this.remove()">[show full]</span>' : '') +
      '</div>';
    if (outputStr.length > 200) el.querySelector('.msg-body').dataset.fullOutput = outputStr;
    const feed = document.getElementById('chat-feed');
    feed.insertBefore(el, document.getElementById('processing'));
    return el;
  }

  function appendPending(target, pid) {
    const lbl = (SENDER_LABELS[target] || target.toUpperCase());
    const ts  = formatTs(new Date().toISOString());
    const el  = document.createElement('div');
    el.className = 'msg ' + target;
    el.id = pid;
    el.innerHTML =
      '<div class="msg-meta"><span class="msg-sender">' + lbl + '</span><span class="msg-ts">' + escHtml(ts) + '</span></div>' +
      '<div class="msg-body pending">' + lbl + ' &mdash; waiting...</div>';
    const feed = document.getElementById('chat-feed');
    feed.insertBefore(el, document.getElementById('processing'));
    return el;
  }

  // ── Feedback ────────────────────────────────────────────────────────────
  function wireFeedback(msgEl, writeId, turnId) {
    const btns = msgEl.querySelector('.feedback-btns');
    if (!btns) return;
    btns.querySelector('.up').onclick   = () => sendFeedback(writeId, turnId, 'up',   btns.querySelector('.up'),   null);
    btns.querySelector('.down').onclick = () => sendFeedback(writeId, turnId, 'down', btns.querySelector('.down'), msgEl);
  }

  async function sendFeedback(writeId, turnId, signal, btnEl, msgWrap) {
    const btns = btnEl.parentElement;
    btns.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
    const payload = { signal };
    if (writeId) payload.write_id = writeId; else if (turnId) payload.turn_id = turnId;
    if (signal === 'down' && msgWrap) {
      const nd = document.createElement('div');
      nd.className = 'feedback-note';
      nd.innerHTML = '<textarea placeholder="What should Karma have said? (optional)" rows="2"></textarea><button>Submit</button>';
      msgWrap.appendChild(nd);
      scrollBottom();
      nd.querySelector('button').onclick = async function() {
        this.disabled = true;
        const note = nd.querySelector('textarea').value.trim();
        if (note) payload.note = note;
        try { await fetch('/v1/feedback', { method: 'POST', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); } catch (_) {}
        nd.remove();
      };
      return;
    }
    try {
      await fetch('/v1/feedback', { method: 'POST', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (signal === 'up' && writeId) {
        const conf = document.createElement('span');
        conf.className = 'write-confirmed'; conf.textContent = '&#x2713; saved';
        btns.appendChild(conf);
        setTimeout(() => conf.remove(), 2100);
      }
    } catch (_) {}
  }

  // Agora panel removed — bus traffic renders at /agora only

  // ── Persistence ──────────────────────────────────────────────────────────
  function saveMessages() {
    const msgs = [];
    document.querySelectorAll('#chat-feed .msg').forEach(el => {
      const role = [...el.classList].find(c => c !== 'msg') || 'system';
      const body = el.querySelector('.msg-body');
      if (!body || body.classList.contains('pending')) return;
      msgs.push({ role, text: body.textContent, writeId: el.dataset.writeId || null, turnId: el.dataset.turnId || null });
    });
    try { localStorage.setItem(MSG_KEY, JSON.stringify(msgs.slice(-200))); } catch (_) {}
  }

  function loadSavedMessages() {
    try {
      const raw = localStorage.getItem(MSG_KEY);
      if (!raw) return;
      JSON.parse(raw).forEach(m => appendMsg(m.role, m.text, m.writeId, m.turnId));
      if (document.querySelectorAll('#chat-feed .msg').length) hideEmpty();
    } catch (_) {}
  }

  function clearConversation() {
    localStorage.removeItem(MSG_KEY);
    conversationId = crypto.randomUUID();
    localStorage.setItem(CONV_KEY, conversationId);
    const feed = document.getElementById('chat-feed');
    feed.innerHTML = '<div id="empty-state">Waiting for Karma...</div><div id="processing">Karma is thinking...</div>';
    pendingBus.clear();
  }

  // ── Status ───────────────────────────────────────────────────────────────
  function updateHeartbeat() {
    if (!lastActivityTs) return;
    document.getElementById('last-seen-val').textContent = timeSince(lastActivityTs);
    const diff = Date.now() - new Date(lastActivityTs).getTime();
    document.getElementById('heartbeat-dot').className =
      diff < 5*60*1000 ? 'stat-dot alive' : diff < 3600*1000 ? 'stat-dot warn' : 'stat-dot dead';
  }

  function updateK2Status() {
    if (!lastActivityTs) return;
    const diff = Date.now() - new Date(lastActivityTs).getTime();
    document.getElementById('k2-dot').className  = diff < 10*60*1000 ? 'stat-dot alive' : diff < 3600*1000 ? 'stat-dot warn' : 'stat-dot dead';
    document.getElementById('k2-val').textContent = diff < 10*60*1000 ? 'active' : diff < 3600*1000 ? 'idle' : 'offline';
  }

  // ── Utilities ────────────────────────────────────────────────────────────
  function hideEmpty() { const e = document.getElementById('empty-state'); if (e) e.style.display = 'none'; }
  function scrollBottom() { const f = document.getElementById('chat-feed'); setTimeout(() => { f.scrollTop = f.scrollHeight; }, 10); }
  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Lightweight markdown renderer — no external deps
  function renderMd(raw) {
    let s = escHtml(raw);
    // Code blocks (```...```)
    s = s.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code (`...`)
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold (**...**)
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic (*...*)
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers (### ... ## ... # ...)
    s = s.replace(/^### (.+)$/gm, '<strong style="font-size:13px">$1</strong>');
    s = s.replace(/^## (.+)$/gm, '<strong style="font-size:14px">$1</strong>');
    s = s.replace(/^# (.+)$/gm, '<strong style="font-size:15px">$1</strong>');
    // Unordered lists (- ...)
    s = s.replace(/^- (.+)$/gm, '&bull; $1');
    // Numbered lists (1. ...)
    s = s.replace(/^(\d+)\. (.+)$/gm, '$1. $2');
    // Horizontal rule (---)
    s = s.replace(/^---$/gm, '<hr style="border-color:#2a2a4a;margin:8px 0">');
    return s;
  }
  function formatTs(iso) { try { return new Date(iso).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch(_) { return String(iso||''); } }
  function timeSince(iso) {
    const d = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
  }

  init();
</script>
</body>
