<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f11;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Token gate */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
  }
  #gate h1 { font-size: 18px; color: #a78bfa; letter-spacing: 4px; }
  #gate p { color: #6b7280; font-size: 12px; }
  #gate input {
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #e2e8f0;
    padding: 8px 12px;
    width: 420px;
    font-family: monospace;
    font-size: 13px;
    outline: none;
  }
  #gate input:focus { border-color: #a78bfa; }
  #gate button {
    background: #a78bfa;
    color: #0f0f11;
    border: none;
    padding: 8px 24px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
  }
  #gate .err { color: #ef4444; font-size: 12px; display: none; }

  /* Main layout */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #0f0f11;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
  }
  #header .title { color: #a78bfa; font-size: 14px; letter-spacing: 3px; }
  #header .status { color: #6b7280; font-size: 11px; margin-left: auto; }
  #header .dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; display: inline-block; }

  /* Persona status bar */
  #persona-bar {
    display: flex;
    gap: 14px;
    padding: 5px 16px;
    background: #0a0a0f;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
    align-items: center;
  }
  .persona {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    opacity: 0.85;
  }
  .persona-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-green  { background: #34d399; }
  .p-amber  { background: #fbbf24; }
  .p-grey   { background: #374151; }

  /* CC Brief compress panel */
  #cc-brief {
    flex-shrink: 0;
    border-bottom: 1px solid #1f2937;
    background: #0a0a0f;
  }
  #cc-brief-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 16px 4px;
    cursor: pointer;
    user-select: none;
  }
  #cc-brief-header .lbl { color: #34d399; font-size: 11px; letter-spacing: 2px; font-weight: bold; }
  #cc-brief-header .sub { color: #4b5563; font-size: 11px; }
  #cc-brief-header .chevron { color: #4b5563; font-size: 10px; margin-left: auto; transition: transform 0.2s; }
  #cc-brief-header .chevron.open { transform: rotate(180deg); }
  #cc-brief-body { padding: 0 16px 10px; display: flex; flex-direction: column; gap: 6px; }
  #cc-brief-input {
    width: 100%;
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #cbd5e1;
    padding: 7px 10px;
    font-family: monospace;
    font-size: 12px;
    resize: vertical;
    min-height: 64px;
    max-height: 180px;
    outline: none;
    line-height: 1.4;
  }
  #cc-brief-input:focus { border-color: #34d399; }
  #cc-brief-input::placeholder { color: #374151; }
  #cc-brief-controls { display: flex; gap: 8px; align-items: center; }
  #cc-brief-btn {
    background: #34d399;
    color: #0f0f11;
    border: none;
    padding: 5px 16px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
  }
  #cc-brief-btn:disabled { opacity: 0.4; cursor: default; }
  #cc-brief-status { color: #4b5563; font-size: 11px; }
  #cc-brief-output {
    background: #111827;
    border: 1px solid #34d399;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #cc-brief-result { color: #e2e8f0; font-size: 12px; line-height: 1.6; white-space: pre-wrap; }
  #cc-brief-copy {
    align-self: flex-end;
    background: transparent;
    border: 1px solid #374151;
    color: #6b7280;
    padding: 3px 12px;
    cursor: pointer;
    font-family: monospace;
    font-size: 11px;
  }
  #cc-brief-copy:hover { border-color: #34d399; color: #34d399; }

  /* ForColby panel */
  #for-colby {
    flex-shrink: 0;
    border-bottom: 1px solid #1f2937;
    background: #0a0a0f;
  }
  #for-colby-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 16px 4px;
    cursor: pointer;
    user-select: none;
  }
  #for-colby-header .lbl { color: #f9fafb; font-size: 11px; letter-spacing: 2px; font-weight: bold; }
  #for-colby-header .sub { color: #4b5563; font-size: 11px; }
  #for-colby-badge {
    background: #374151; color: #f9fafb;
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    display: none;
  }
  #for-colby-badge.has-items { background: #f9fafb; color: #0f0f11; display: inline-block; }
  #for-colby-header .chevron { color: #4b5563; font-size: 10px; margin-left: auto; transition: transform 0.2s; }
  #for-colby-header .chevron.open { transform: rotate(180deg); }
  #for-colby-body { padding: 0 16px 10px; display: none; flex-direction: column; gap: 6px; }
  #for-colby-actions { display: flex; justify-content: flex-end; margin-bottom: 2px; }
  #for-colby-clear {
    background: transparent; border: 1px solid #374151;
    color: #6b7280; padding: 2px 10px; cursor: pointer;
    font-family: monospace; font-size: 11px;
  }
  #for-colby-clear:hover { border-color: #6b7280; color: #e2e8f0; }
  #for-colby-empty { color: #374151; font-size: 11px; font-style: italic; }
  .fc-item {
    background: #111827;
    border-left: 2px solid #f9fafb;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .fc-item-meta { display: flex; gap: 8px; align-items: center; }
  .fc-item-from { font-size: 11px; font-weight: bold; }
  .fc-item-ts { color: #4b5563; font-size: 10px; }
  .fc-item-content { color: #e2e8f0; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .fc-item-dismiss {
    align-self: flex-end; background: transparent;
    border: 1px solid #374151; color: #4b5563;
    padding: 2px 8px; cursor: pointer;
    font-family: monospace; font-size: 10px;
    margin-top: 2px;
  }
  .fc-item-dismiss:hover { border-color: #6b7280; color: #9ca3af; }

  /* Session Brief panel */
  #session-brief {
    flex-shrink: 0;
    border-bottom: 1px solid #1f2937;
    background: #0a0a0f;
  }
  #session-brief-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 16px 4px;
    cursor: pointer;
    user-select: none;
  }
  #session-brief-header .lbl { color: #fbbf24; font-size: 11px; letter-spacing: 2px; font-weight: bold; }
  #session-brief-header .sub { color: #4b5563; font-size: 11px; }
  #session-brief-header .chevron { color: #4b5563; font-size: 10px; margin-left: auto; transition: transform 0.2s; }
  #session-brief-header .chevron.open { transform: rotate(180deg); }
  #session-brief-body { padding: 0 16px 10px; display: flex; flex-direction: column; gap: 6px; display: none; }
  #session-brief-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #session-brief-count { color: #4b5563; font-size: 11px; }
  #session-brief-filter {
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #9ca3af;
    padding: 4px 8px;
    font-family: monospace;
    font-size: 11px;
    outline: none;
  }
  #session-brief-btn {
    background: #fbbf24;
    color: #0f0f11;
    border: none;
    padding: 5px 16px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
  }
  #session-brief-btn:disabled { opacity: 0.4; cursor: default; }
  #session-brief-status { color: #4b5563; font-size: 11px; }
  #session-brief-output {
    background: #111827;
    border: 1px solid #fbbf24;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #session-brief-result { color: #e2e8f0; font-size: 12px; line-height: 1.6; white-space: pre-wrap; }
  #session-brief-copy {
    align-self: flex-end;
    background: transparent;
    border: 1px solid #374151;
    color: #6b7280;
    padding: 3px 12px;
    cursor: pointer;
    font-family: monospace;
    font-size: 11px;
  }
  #session-brief-copy:hover { border-color: #fbbf24; color: #fbbf24; }

  /* Feed */
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

  /* Message entries */
  .entry {
    display: flex;
    gap: 10px;
    padding: 5px 8px;
    border-left: 2px solid transparent;
    border-radius: 2px;
    line-height: 1.5;
    transition: background 0.2s;
  }
  .entry:hover { background: #1a1a2e; }
  .entry.blocking { border-left-color: #ef4444; }
  .entry.pulse { animation: pulse 1s ease-out; }

  @keyframes pulse {
    0%   { background: rgba(251,191,36,0.2); }
    100% { background: transparent; }
  }

  .entry .ts { color: #4b5563; font-size: 11px; white-space: nowrap; flex-shrink: 0; padding-top: 1px; }
  .entry .route { white-space: nowrap; flex-shrink: 0; }
  .entry .content { color: #cbd5e1; word-break: break-word; flex: 1; }
  .more-btn { background: none; border: none; color: #6b7280; font-size: 11px; cursor: pointer; padding: 0 2px; text-decoration: underline; }
  .more-btn:hover { color: #9ca3af; }
  .entry-dismiss { background: none; border: none; color: #374151; font-size: 11px; cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1; margin-left: auto; }
  .entry-dismiss:hover { color: #6b7280; }

  /* Agent colors */
  .agent-karma  { color: #a78bfa; }
  .agent-cc     { color: #34d399; }
  .agent-kcc    { color: #67e8f9; }
  .agent-codex  { color: #fb923c; }
  .agent-colby  { color: #f9fafb; }
  .agent-other  { color: #9ca3af; }

  .badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .badge-blocking     { background: #7f1d1d; color: #fca5a5; }
  .badge-informational { background: #1e3a5f; color: #93c5fd; }

  /* Input bar */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #0f0f11;
    border-top: 1px solid #1f2937;
    flex-shrink: 0;
    align-items: center;
  }
  #input-bar select {
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #9ca3af;
    padding: 6px 8px;
    font-family: monospace;
    font-size: 12px;
    outline: none;
    flex-shrink: 0;
  }
  #input-bar input {
    flex: 1;
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #e2e8f0;
    padding: 6px 10px;
    font-family: monospace;
    font-size: 12px;
    outline: none;
  }
  #input-bar input:focus { border-color: #4b5563; }
  #input-bar input::placeholder { color: #374151; }
  #input-bar button {
    background: transparent;
    border: 1px solid #374151;
    color: #6b7280;
    padding: 6px 14px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    flex-shrink: 0;
  }
  #input-bar button:hover { border-color: #6b7280; color: #e2e8f0; }
</style>
</head>
<body>

<!-- Token gate -->
<div id="gate">
  <h1>AGORA</h1>
  <p>convergence room</p>
  <input id="token-input" type="password" placeholder="hub chat token" />
  <button onclick="submitToken()">enter</button>
  <span class="err" id="gate-err">invalid token</span>
</div>

<!-- Main app -->
<div id="app">
  <div id="header">
    <span class="title">AGORA</span>
    <span class="dot" id="status-dot"></span>
    <span class="status" id="status-text">connecting...</span>
  </div>
  <div id="persona-bar"></div>

  <!-- CC Brief compress panel -->
  <div id="cc-brief">
    <div id="cc-brief-header" onclick="toggleBrief()">
      <span class="lbl">CC BRIEF</span>
      <span class="sub">compress agent output for CC</span>
      <span class="chevron" id="cc-brief-chevron">▼</span>
    </div>
    <div id="cc-brief-body">
      <textarea id="cc-brief-input" rows="4" placeholder="paste Karma / Codex / Kiki output here..."></textarea>
      <div id="cc-brief-controls">
        <button id="cc-brief-btn" onclick="compressForCC()">compress</button>
        <span id="cc-brief-status"></span>
      </div>
      <div id="cc-brief-output" style="display:none">
        <div id="cc-brief-result"></div>
        <button id="cc-brief-copy" onclick="copyBrief()">copy to clipboard</button>
      </div>
    </div>
  </div>

  <!-- ForColby panel — messages explicitly addressed to Colby -->
  <div id="for-colby">
    <div id="for-colby-header" onclick="toggleForColby()">
      <span class="lbl">FOR COLBY</span>
      <span id="for-colby-badge"></span>
      <span class="sub" id="for-colby-sub">agents post here when action/review needed</span>
      <span class="chevron" id="for-colby-chevron">▼</span>
    </div>
    <div id="for-colby-body">
      <div id="for-colby-actions">
        <button id="for-colby-clear" onclick="clearForColby()">clear all</button>
      </div>
      <div id="for-colby-list"></div>
    </div>
  </div>

  <!-- Session Brief panel -->
  <div id="session-brief">
    <div id="session-brief-header" onclick="toggleSessionBrief()">
      <span class="lbl">SESSION BRIEF</span>
      <span class="sub">auto-reads live bus feed (no paste) → builds CC session opener</span>
      <span class="chevron" id="session-brief-chevron">▼</span>
    </div>
    <div id="session-brief-body">
      <div id="session-brief-controls">
        <select id="session-brief-filter">
          <option value="all">all agents</option>
          <option value="karma">karma only</option>
          <option value="codex">codex only</option>
          <option value="kiki">kiki / cc</option>
        </select>
        <span id="session-brief-count">0 messages</span>
        <button id="session-brief-btn" onclick="buildSessionBrief()">build for CC</button>
        <span id="session-brief-status"></span>
      </div>
      <div id="session-brief-output" style="display:none">
        <div id="session-brief-result"></div>
        <button id="session-brief-copy" onclick="copySessionBrief()">copy to clipboard</button>
      </div>
    </div>
  </div>

  <div id="feed"></div>
  <div id="input-bar">
    <select id="to-select">
      <option value="all">→ all</option>
      <option value="karma">→ karma</option>
      <option value="cc">→ cc</option>
      <option value="kcc">→ kcc</option>
      <option value="codex">→ codex</option>
    </select>
    <input id="msg-input" type="text" placeholder="post to bus..." />
    <button onclick="postMessage()">send</button>
  </div>
</div>

<script>
const BASE = window.location.origin;
const POLL_MS = 4000;
const AGENT_CLASSES = { karma:'agent-karma', cc:'agent-cc', kcc:'agent-kcc', codex:'agent-codex', colby:'agent-colby' };
let token = '';
let seenIds = new Set();
let autoScroll = true;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('agora_token');
  if (saved) { token = saved; launch(); }
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitToken();
  });
});

async function submitToken() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  try {
    const r = await fetch(`${BASE}/v1/coordination/recent?limit=1`, {
      headers: { Authorization: `Bearer ${val}` }
    });
    if (!r.ok) throw new Error('unauthorized');
    token = val;
    localStorage.setItem('agora_token', token);
    launch();
  } catch {
    document.getElementById('gate-err').style.display = 'block';
  }
}

function launch() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  poll();
  setInterval(poll, POLL_MS);
  const feed = document.getElementById('feed');
  feed.addEventListener('scroll', () => {
    autoScroll = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 20;
  });
  const msgInput = document.getElementById('msg-input');
  const toSelect = document.getElementById('to-select');
  const MENTION_MAP = { karma:'karma', cc:'cc', asher:'cc', kcc:'kcc', codex:'codex', kiki:'karma', colby:'colby' };
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') postMessage(); });
  msgInput.addEventListener('input', () => {
    const val = msgInput.value;
    const m = val.match(/^@(\w+)/);
    if (m) {
      const agent = MENTION_MAP[m[1].toLowerCase()];
      if (agent) toSelect.value = agent;
    }
  });
}

const PERSONAS = [
  { name: 'karma', color: '#a78bfa' },
  { name: 'cc',    color: '#34d399' },
  { name: 'kcc',   color: '#67e8f9' },
  { name: 'codex', color: '#fb923c' },
  { name: 'kiki',  color: '#f472b6' },
  { name: 'asher', color: '#a3e635' },
  { name: 'colby', color: '#f9fafb' },
];
const lastSeen = {}; // agent -> ms timestamp

function updatePersonaBar() {
  const bar = document.getElementById('persona-bar');
  const now = Date.now();
  bar.innerHTML = PERSONAS.map(p => {
    const ms = lastSeen[p.name];
    const ago = ms ? (now - ms) : Infinity;
    const dotClass = ago < 5 * 60000 ? 'p-green' : ago < 15 * 60000 ? 'p-amber' : 'p-grey';
    const label = ms ? (ago < 60000 ? 'now' : `${Math.floor(ago/60000)}m`) : '—';
    return `<span class="persona"><span class="persona-dot ${dotClass}"></span><span style="color:${p.color}">${p.name}</span><span style="color:#4b5563">${label}</span></span>`;
  }).join('');
}

async function poll() {
  try {
    const r = await fetch(`${BASE}/v1/coordination/recent?limit=50`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const entries = (data.entries || []).sort(
      (a, b) => new Date(a.created_at) - new Date(b.created_at)
    );
    for (const e of entries) {
      const t = new Date(e.created_at).getTime();
      if (e.from && t > (lastSeen[e.from] || 0)) lastSeen[e.from] = t;
      if (seenIds.has(e.id)) continue;
      seenIds.add(e.id);
      busEntries.push(e);
      renderEntry(e, true);
    }
    updatePersonaBar();
    renderForColby();
    setStatus('live', `${seenIds.size} messages`);
  } catch (err) {
    setStatus('error', `error: ${err.message}`);
  }
}

function agentClass(name) {
  return AGENT_CLASSES[name?.toLowerCase()] || 'agent-other';
}

function formatTs(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  } catch { return '??:??:??'; }
}

function renderEntry(e, isNew) {
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'entry';
  div.dataset.id = e.id;

  if (e.urgency === 'blocking') div.classList.add('blocking');
  const addressedToColby = (e.to === 'colby' || e.to === 'all') && e.from !== 'colby';
  if (isNew && addressedToColby) div.classList.add('pulse');

  const fromClass = agentClass(e.from);
  const toClass = agentClass(e.to);
  const badgeClass = e.urgency === 'blocking' ? 'badge-blocking' : 'badge-informational';

  let contentText = e.content || '';
  try {
    const parsed = JSON.parse(contentText);
    contentText = JSON.stringify(parsed, null, 0).replace(/,/g, ', ');
  } catch {}

  const TRUNC = 220;
  const long = contentText.length > TRUNC;
  const short = long ? contentText.slice(0, TRUNC) : contentText;

  div.innerHTML = `
    <span class="ts">${formatTs(e.created_at)}</span>
    <span class="route">
      <span class="${fromClass}">${escHtml(e.from)}</span>
      <span style="color:#4b5563">\u2192</span>
      <span class="${toClass}">${escHtml(e.to)}</span>
    </span>
    <span class="badge ${badgeClass}">${escHtml(e.urgency)}</span>
    <span class="content">
      <span class="msg-short">${escHtml(short)}${long ? ' <button class="more-btn" onclick="var p=this.closest(\'.entry\');p.querySelector(\'.msg-full\').style.display=\'inline\';p.querySelector(\'.msg-short\').style.display=\'none\'">\u2026more</button>' : ''}</span>
      ${long ? `<span class="msg-full" style="display:none">${escHtml(contentText)} <button class="more-btn" onclick="var p=this.closest('.entry');p.querySelector('.msg-full').style.display='none';p.querySelector('.msg-short').style.display='inline'">less</button></span>` : ''}
    </span>
    <button class="entry-dismiss" onclick="dismissEntry(this)" title="dismiss">×</button>
  `;

  feed.appendChild(div);
  if (autoScroll) feed.scrollTop = feed.scrollHeight;
}

function dismissEntry(btn) {
  btn.closest('.entry').remove();
}

async function postMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  const to = document.getElementById('to-select').value;
  try {
    const r = await fetch(`${BASE}/v1/coordination/post`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ from: 'colby', to, urgency: 'informational', type: 'inform', content: msg })
    });
    if (!r.ok) throw new Error(await r.text());
    input.value = '';
    setTimeout(poll, 300);
  } catch (err) {
    alert(`post failed: ${err.message}`);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.style.background = state === 'live' ? '#34d399' : '#ef4444';
  txt.textContent = text;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ForColby panel ───────────────────────────────────────────────────────────
let forColbyOpen = false;
const dismissedForColby = new Set();

function toggleForColby() {
  forColbyOpen = !forColbyOpen;
  document.getElementById('for-colby-body').style.display = forColbyOpen ? 'flex' : 'none';
  document.getElementById('for-colby-chevron').classList.toggle('open', forColbyOpen);
}

function renderForColby() {
  const items = busEntries.filter(e =>
    e.to === 'colby' && !dismissedForColby.has(e.id)
  ).slice().reverse(); // most recent first

  const badge = document.getElementById('for-colby-badge');
  const sub = document.getElementById('for-colby-sub');
  badge.textContent = items.length || '';
  badge.classList.toggle('has-items', items.length > 0);
  sub.textContent = items.length
    ? `${items.length} item${items.length > 1 ? 's' : ''} need your attention`
    : 'agents post here when action/review needed';

  if (!forColbyOpen && items.length > 0) {
    // Auto-open when new items arrive
    forColbyOpen = true;
    document.getElementById('for-colby-body').style.display = 'flex';
    document.getElementById('for-colby-chevron').classList.add('open');
  }

  const list = document.getElementById('for-colby-list');
  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div class="fc-item-empty" style="color:#374151;font-size:11px;font-style:italic;">no items</div>';
    return;
  }
  for (const e of items) {
    const fromClass = agentClass(e.from);
    const div = document.createElement('div');
    div.className = 'fc-item';
    div.innerHTML = `
      <div class="fc-item-meta">
        <span class="fc-item-from ${fromClass}">${escHtml(e.from)}</span>
        <span class="fc-item-ts">${formatTs(e.created_at)}</span>
      </div>
      <div class="fc-item-content">${escHtml(e.content || '')}</div>
      <button class="fc-item-dismiss" onclick="dismissForColby('${e.id}')">dismiss</button>
    `;
    list.appendChild(div);
  }
}

function dismissForColby(id) {
  dismissedForColby.add(id);
  renderForColby();
}

function clearForColby() {
  busEntries.filter(e => e.to === 'colby').forEach(e => dismissedForColby.add(e.id));
  renderForColby();
}

// ── Session Brief panel ───────────────────────────────────────────────────────
// Stores raw bus entries as they arrive for use in session brief
const busEntries = [];
let sessionBriefOpen = false;

function toggleSessionBrief() {
  sessionBriefOpen = !sessionBriefOpen;
  const body = document.getElementById('session-brief-body');
  body.style.display = sessionBriefOpen ? 'flex' : 'none';
  document.getElementById('session-brief-chevron').classList.toggle('open', sessionBriefOpen);
  if (sessionBriefOpen) updateSessionBriefCount();
}

function updateSessionBriefCount() {
  const filter = document.getElementById('session-brief-filter').value;
  const filtered = getFilteredEntries(filter);
  document.getElementById('session-brief-count').textContent = `${filtered.length} messages`;
}

function getFilteredEntries(filter) {
  const AGENT_GROUPS = {
    'karma': ['karma'],
    'codex': ['codex'],
    'kiki': ['kiki', 'cc'],
    'all': null
  };
  const allowed = AGENT_GROUPS[filter];
  return busEntries.filter(e => {
    if (e.urgency === 'informational' && e.from === 'cc' && filter !== 'kiki') return false;
    if (allowed && !allowed.includes(e.from?.toLowerCase())) return false;
    return true;
  }).slice(-20); // last 20 relevant entries
}

async function buildSessionBrief() {
  const filter = document.getElementById('session-brief-filter').value;
  const entries = getFilteredEntries(filter);
  if (!entries.length) {
    document.getElementById('session-brief-status').textContent = 'no messages to compress';
    return;
  }
  const btn = document.getElementById('session-brief-btn');
  const status = document.getElementById('session-brief-status');
  const output = document.getElementById('session-brief-output');
  const result = document.getElementById('session-brief-result');
  btn.disabled = true;
  status.textContent = `compressing ${entries.length} messages...`;
  output.style.display = 'none';

  const raw = entries.map(e =>
    `[${e.from}→${e.to} ${(e.created_at||'').slice(11,16)}] ${e.content||''}`
  ).join('\n');

  const prompt =
    'BUILD CC SESSION BRIEF. You are compressing coordination bus messages for CC (Claude Code, Ascendant). ' +
    'Extract: 1) current system state in one line, 2) what changed since last session, ' +
    '3) one blocker or open question, 4) recommended first action. ' +
    'Max 5 lines total. No narration. Facts only.\n\nBUS MESSAGES:\n' + raw;
  try {
    const r = await fetch(`${BASE}/v1/chat`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt, session_id: 'session-brief-' + Date.now() })
    });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    const text = data.response || data.text || data.assistant_text || data.content || JSON.stringify(data);
    result.textContent = text;
    output.style.display = 'flex';
    status.textContent = '';
    navigator.clipboard.writeText(text).catch(() => {});
  } catch (err) {
    status.textContent = `error: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

function copySessionBrief() {
  const text = document.getElementById('session-brief-result').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('session-brief-copy');
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'copy to clipboard'; }, 1500);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('session-brief-filter').addEventListener('change', updateSessionBriefCount);
});

// ── CC Brief compress panel ──────────────────────────────────────────────────
let briefOpen = true;

function toggleBrief() {
  briefOpen = !briefOpen;
  document.getElementById('cc-brief-body').style.display = briefOpen ? 'flex' : 'none';
  document.getElementById('cc-brief-chevron').classList.toggle('open', briefOpen);
}

async function compressForCC() {
  const input = document.getElementById('cc-brief-input').value.trim();
  if (!input) return;
  const btn = document.getElementById('cc-brief-btn');
  const status = document.getElementById('cc-brief-status');
  const output = document.getElementById('cc-brief-output');
  const result = document.getElementById('cc-brief-result');
  btn.disabled = true;
  status.textContent = 'compressing...';
  output.style.display = 'none';
  const prompt =
    'COMPRESS FOR CC (Claude Code, Ascendant). ' +
    'Extract only: 1) what decision or action is needed, 2) what is verified vs inferred, ' +
    '3) recommended path forward. Max 4 lines. No narration, no repetition. Start with the decision.\n\n' +
    'AGENT OUTPUT:\n' + input;
  try {
    const r = await fetch(`${BASE}/v1/chat`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt, session_id: 'cc-brief-' + Date.now() })
    });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    const text = data.response || data.text || data.assistant_text || data.content || JSON.stringify(data);
    result.textContent = text;
    output.style.display = 'flex';
    status.textContent = 'copied to clipboard ✓';
    setTimeout(() => { status.textContent = ''; }, 2000);
    // auto-copy + clear input
    navigator.clipboard.writeText(text).catch(() => {});
    document.getElementById('cc-brief-input').value = '';
  } catch (err) {
    status.textContent = `error: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

function copyBrief() {
  const text = document.getElementById('cc-brief-result').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cc-brief-copy');
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'copy to clipboard'; }, 1500);
  });
}
