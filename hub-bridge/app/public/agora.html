<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f11;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Token gate */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
  }
  #gate h1 { font-size: 18px; color: #a78bfa; letter-spacing: 4px; }
  #gate p { color: #6b7280; font-size: 12px; }
  #gate input {
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #e2e8f0;
    padding: 8px 12px;
    width: 420px;
    font-family: monospace;
    font-size: 13px;
    outline: none;
  }
  #gate input:focus { border-color: #a78bfa; }
  #gate button {
    background: #a78bfa;
    color: #0f0f11;
    border: none;
    padding: 8px 24px;
    cursor: pointer;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
  }
  #gate .err { color: #ef4444; font-size: 12px; display: none; }

  /* Main layout */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #0f0f11;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
  }
  #header .title { color: #a78bfa; font-size: 14px; letter-spacing: 3px; }
  #header .status { color: #6b7280; font-size: 11px; margin-left: auto; }
  #header .dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; display: inline-block; }

  /* Feed */
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

  /* Message entries */
  .entry {
    display: flex;
    gap: 10px;
    padding: 5px 8px;
    border-left: 2px solid transparent;
    border-radius: 2px;
    line-height: 1.5;
    transition: background 0.2s;
  }
  .entry:hover { background: #1a1a2e; }
  .entry.blocking { border-left-color: #ef4444; }
  .entry.pulse { animation: pulse 1s ease-out; }

  @keyframes pulse {
    0%   { background: rgba(251,191,36,0.2); }
    100% { background: transparent; }
  }

  .entry .ts { color: #4b5563; font-size: 11px; white-space: nowrap; flex-shrink: 0; padding-top: 1px; }
  .entry .route { white-space: nowrap; flex-shrink: 0; }
  .entry .content { color: #cbd5e1; word-break: break-word; flex: 1; }
  .more-btn { background: none; border: none; color: #6b7280; font-size: 11px; cursor: pointer; padding: 0 2px; text-decoration: underline; }
  .more-btn:hover { color: #9ca3af; }

  /* Agent colors */
  .agent-karma  { color: #a78bfa; }
  .agent-cc     { color: #34d399; }
  .agent-kcc    { color: #67e8f9; }
  .agent-codex  { color: #fb923c; }
  .agent-colby  { color: #f9fafb; }
  .agent-other  { color: #9ca3af; }

  .badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .badge-blocking     { background: #7f1d1d; color: #fca5a5; }
  .badge-informational { background: #1e3a5f; color: #93c5fd; }

  /* Input bar */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #0f0f11;
    border-top: 1px solid #1f2937;
    flex-shrink: 0;
    align-items: center;
  }
  #input-bar select {
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #9ca3af;
    padding: 6px 8px;
    font-family: monospace;
    font-size: 12px;
    outline: none;
    flex-shrink: 0;
  }
  #input-bar input {
    flex: 1;
    background: #1e1e2e;
    border: 1px solid #374151;
    color: #e2e8f0;
    padding: 6px 10px;
    font-family: monospace;
    font-size: 12px;
    outline: none;
  }
  #input-bar input:focus { border-color: #4b5563; }
  #input-bar input::placeholder { color: #374151; }
  #input-bar button {
    background: transparent;
    border: 1px solid #374151;
    color: #6b7280;
    padding: 6px 14px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    flex-shrink: 0;
  }
  #input-bar button:hover { border-color: #6b7280; color: #e2e8f0; }
</style>
</head>
<body>

<!-- Token gate -->
<div id="gate">
  <h1>AGORA</h1>
  <p>convergence room</p>
  <input id="token-input" type="password" placeholder="hub chat token" />
  <button onclick="submitToken()">enter</button>
  <span class="err" id="gate-err">invalid token</span>
</div>

<!-- Main app -->
<div id="app">
  <div id="header">
    <span class="title">AGORA</span>
    <span class="dot" id="status-dot"></span>
    <span class="status" id="status-text">connecting...</span>
  </div>
  <div id="feed"></div>
  <div id="input-bar">
    <select id="to-select">
      <option value="all">→ all</option>
      <option value="karma">→ karma</option>
      <option value="cc">→ cc</option>
      <option value="kcc">→ kcc</option>
      <option value="codex">→ codex</option>
    </select>
    <input id="msg-input" type="text" placeholder="post to bus..." />
    <button onclick="postMessage()">send</button>
  </div>
</div>

<script>
const BASE = window.location.origin;
const POLL_MS = 4000;
const AGENT_CLASSES = { karma:'agent-karma', cc:'agent-cc', kcc:'agent-kcc', codex:'agent-codex', colby:'agent-colby' };
let token = '';
let seenIds = new Set();
let autoScroll = true;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('agora_token');
  if (saved) { token = saved; launch(); }
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitToken();
  });
});

async function submitToken() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  try {
    const r = await fetch(`${BASE}/v1/coordination/recent?limit=1`, {
      headers: { Authorization: `Bearer ${val}` }
    });
    if (!r.ok) throw new Error('unauthorized');
    token = val;
    localStorage.setItem('agora_token', token);
    launch();
  } catch {
    document.getElementById('gate-err').style.display = 'block';
  }
}

function launch() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  poll();
  setInterval(poll, POLL_MS);
  const feed = document.getElementById('feed');
  feed.addEventListener('scroll', () => {
    autoScroll = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 20;
  });
  const msgInput = document.getElementById('msg-input');
  const toSelect = document.getElementById('to-select');
  const MENTION_MAP = { karma:'karma', cc:'cc', asher:'cc', kcc:'kcc', codex:'codex', kiki:'karma', colby:'colby' };
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') postMessage(); });
  msgInput.addEventListener('input', () => {
    const val = msgInput.value;
    const m = val.match(/^@(\w+)/);
    if (m) {
      const agent = MENTION_MAP[m[1].toLowerCase()];
      if (agent) toSelect.value = agent;
    }
  });
}

async function poll() {
  try {
    const r = await fetch(`${BASE}/v1/coordination/recent?limit=50`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const entries = (data.entries || []).sort(
      (a, b) => new Date(a.created_at) - new Date(b.created_at)
    );
    for (const e of entries) {
      if (seenIds.has(e.id)) continue;
      seenIds.add(e.id);
      renderEntry(e, true);
    }
    setStatus('live', `${seenIds.size} messages`);
  } catch (err) {
    setStatus('error', `error: ${err.message}`);
  }
}

function agentClass(name) {
  return AGENT_CLASSES[name?.toLowerCase()] || 'agent-other';
}

function formatTs(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  } catch { return '??:??:??'; }
}

function renderEntry(e, isNew) {
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'entry';
  div.dataset.id = e.id;

  if (e.urgency === 'blocking') div.classList.add('blocking');
  const addressedToColby = (e.to === 'colby' || e.to === 'all') && e.from !== 'colby';
  if (isNew && addressedToColby) div.classList.add('pulse');

  const fromClass = agentClass(e.from);
  const toClass = agentClass(e.to);
  const badgeClass = e.urgency === 'blocking' ? 'badge-blocking' : 'badge-informational';

  let contentText = e.content || '';
  try {
    const parsed = JSON.parse(contentText);
    contentText = JSON.stringify(parsed, null, 0).replace(/,/g, ', ');
  } catch {}

  const TRUNC = 220;
  const long = contentText.length > TRUNC;
  const short = long ? contentText.slice(0, TRUNC) : contentText;

  div.innerHTML = `
    <span class="ts">${formatTs(e.created_at)}</span>
    <span class="route">
      <span class="${fromClass}">${escHtml(e.from)}</span>
      <span style="color:#4b5563">\u2192</span>
      <span class="${toClass}">${escHtml(e.to)}</span>
    </span>
    <span class="badge ${badgeClass}">${escHtml(e.urgency)}</span>
    <span class="content">
      <span class="msg-short">${escHtml(short)}${long ? ' <button class="more-btn" onclick="var p=this.closest(\'.entry\');p.querySelector(\'.msg-full\').style.display=\'inline\';p.querySelector(\'.msg-short\').style.display=\'none\'">\u2026more</button>' : ''}</span>
      ${long ? `<span class="msg-full" style="display:none">${escHtml(contentText)} <button class="more-btn" onclick="var p=this.closest('.entry');p.querySelector('.msg-full').style.display='none';p.querySelector('.msg-short').style.display='inline'">less</button></span>` : ''}
    </span>
  `;

  feed.appendChild(div);
  if (autoScroll) feed.scrollTop = feed.scrollHeight;
}

async function postMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  const to = document.getElementById('to-select').value;
  try {
    const r = await fetch(`${BASE}/v1/coordination/post`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ from: 'colby', to, urgency: 'informational', type: 'inform', content: msg })
    });
    if (!r.ok) throw new Error(await r.text());
    input.value = '';
    setTimeout(poll, 300);
  } catch (err) {
    alert(`post failed: ${err.message}`);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.style.background = state === 'live' ? '#34d399' : '#ef4444';
  txt.textContent = text;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
