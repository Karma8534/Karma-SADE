<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGORA — Evolution Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,sans-serif;padding:16px;max-width:960px;margin:0 auto}
h1{color:#7c3aed;font-size:18px;letter-spacing:4px;margin-bottom:4px}
.subtitle{color:#6b7280;font-size:12px;margin-bottom:20px}
.section{margin-bottom:24px}
.section-title{color:#9ca3af;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #1f2937;padding-bottom:4px}
.event{background:#161b22;border-left:3px solid #374151;border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:6px;font-size:13px;line-height:1.5}
.event .ts{color:#6b7280;font-size:11px}
.event .from{font-weight:600;margin-right:6px}
.event .content{color:#c9d1d9;white-space:pre-wrap;word-break:break-word}
.event.promote{border-left-color:#10b981}
.event.self-edit{border-left-color:#f59e0b}
.event.pitfall{border-left-color:#ef4444}
.event.decision{border-left-color:#3b82f6}
.event.heartbeat{border-left-color:#374151;opacity:0.6}
.event.proof{border-left-color:#8b5cf6}
.event.chat{border-left-color:#6366f1}
.chat-user{color:#9ca3af;font-size:12px}
.chat-assistant{color:#e6edf3;font-size:13px;margin-top:2px}
.status{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.status-item{background:#161b22;border-radius:6px;padding:8px 14px;font-size:12px}
.status-item .label{color:#6b7280}
.status-item .val{color:#e6edf3;font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.green{background:#10b981}.dot.yellow{background:#f59e0b}.dot.red{background:#ef4444}.dot.gray{background:#374151}
.refresh-btn{background:#1f2937;border:1px solid #374151;color:#9ca3af;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;float:right}
.refresh-btn:hover{background:#374151;color:#e6edf3}
a{color:#7c3aed;text-decoration:none}
a:hover{text-decoration:underline}
#error{color:#ef4444;font-size:12px;margin-bottom:8px;display:none}
</style>
</head><body>
<h1>AGORA</h1>
<div class="subtitle">Evolution Dashboard — Sovereign Guidance Surface &middot; <a href="/">Back to Nexus</a></div>
<div id="error"></div>
<div class="status" id="status-bar"></div>
<div class="section">
  <div class="section-title">K2 EVOLUTION STATE (LIVE) <button class="refresh-btn" onclick="load()">REFRESH</button></div>
  <div id="k2-state">Loading...</div>
</div>
<div class="section">
  <div class="section-title">EVOLUTION EVENTS</div>
  <div id="events">Loading...</div>
</div>
<div class="section">
  <div class="section-title">RECENT NEXUS CONVERSATIONS</div>
  <div id="chats">Loading...</div>
</div>
<script>
const TOKEN = localStorage.getItem('hubToken') || '';
const ERR = document.getElementById('error');

function classify(content) {
  const c = (content || '').toLowerCase();
  if (c.includes('promot')) return 'promote';
  if (c.includes('self-edit') || c.includes('self_edit') || c.includes('modified')) return 'self-edit';
  if (c.includes('pitfall') || c.includes('error') || c.includes('fail')) return 'pitfall';
  if (c.includes('decision') || c.includes('locked')) return 'decision';
  if (c.includes('proof') || c.includes('verified') || c.includes('pass')) return 'proof';
  if (c.includes('heartbeat')) return 'heartbeat';
  return '';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ago(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60000) return Math.floor(ms/1000) + 's ago';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm ago';
  if (ms < 86400000) return Math.floor(ms/3600000) + 'h ago';
  return Math.floor(ms/86400000) + 'd ago';
}

async function load() {
  try {
    ERR.style.display = 'none';
    const r = await fetch('/agora/events', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (!r.ok) { ERR.textContent = 'Auth failed. Go to Nexus first to login.'; ERR.style.display = 'block'; return; }
    const d = await r.json();

    // K2 Evolution State (live from cortex + governor)
    var k2El = document.getElementById('k2-state');
    var k2 = d.k2_evolution;
    if (k2 && !k2.error) {
      var cx = k2.cortex || {};
      k2El.innerHTML =
        '<div class="event promote" style="border-left-color:#10b981">' +
        '<div style="font-size:14px;font-weight:600;color:#10b981">Vesper Pipeline</div>' +
        '<div class="content">' +
        'Cortex: ' + (cx.knowledge_blocks || '?') + ' blocks, ' + (cx.conversation_msgs || '?') + ' msgs, model: ' + (cx.model || '?') + ', uptime: ' + Math.floor((cx.uptime_s||0)/3600) + 'h\n' +
        'Governor: ' + esc(k2.governor_summary || 'querying...') +
        '</div></div>';
    } else if (k2 && k2.error) {
      k2El.innerHTML = '<div class="event pitfall">K2 unreachable: ' + esc(k2.error) + '</div>';
    } else {
      k2El.innerHTML = '<div style="color:#6b7280;font-size:13px">K2 evolution state unavailable</div>';
    }

    var evts = d.evolution_events || [];
    var promos = evts.filter(function(e) { return classify(e.content) === 'promote'; }).length;
    var edits = evts.filter(function(e) { return classify(e.content) === 'self-edit'; }).length;
    var pitfalls = evts.filter(function(e) { return classify(e.content) === 'pitfall'; }).length;
    document.getElementById('status-bar').innerHTML =
      '<div class="status-item"><span class="label">Events:</span> <span class="val">' + evts.length + '</span></div>' +
      '<div class="status-item"><span class="dot green"></span><span class="label">Promotions:</span> <span class="val">' + promos + '</span></div>' +
      '<div class="status-item"><span class="dot yellow"></span><span class="label">Self-edits:</span> <span class="val">' + edits + '</span></div>' +
      '<div class="status-item"><span class="dot red"></span><span class="label">Pitfalls:</span> <span class="val">' + pitfalls + '</span></div>' +
      '<div class="status-item"><span class="label">Chats:</span> <span class="val">' + (d.recent_chats||[]).length + '</span></div>';

    const eventsEl = document.getElementById('events');
    if (!evts.length) { eventsEl.innerHTML = '<div style="color:#6b7280;font-size:13px">No evolution events in bus cache (24h window)</div>'; }
    else {
      eventsEl.innerHTML = evts.map(function(e) {
        var cls = classify(e.content);
        var fromColor = e.from==='regent'?'#10b981':e.from==='cc'?'#3b82f6':e.from==='cc-watchdog'?'#f59e0b':'#9ca3af';
        return '<div class="event ' + cls + '">' +
          '<span class="ts">' + ago(e.created_at) + '</span> ' +
          '<span class="from" style="color:' + fromColor + '">' + esc(e.from) + '</span>' +
          '<span style="color:#6b7280">&rarr; ' + esc(e.to) + '</span>' +
          '<div class="content">' + esc(e.content).slice(0, 500) + '</div>' +
          '</div>';
      }).join('');
    }

    var chatsEl = document.getElementById('chats');
    var chats = (d.recent_chats || []).reverse();
    if (!chats.length) { chatsEl.innerHTML = '<div style="color:#6b7280;font-size:13px">No recent Nexus conversations</div>'; }
    else {
      chatsEl.innerHTML = chats.map(function(c) {
        return '<div class="event chat">' +
          '<span class="ts">' + ago(c.ts) + '</span>' +
          '<div class="chat-user">Colby: ' + esc(c.user).slice(0, 200) + '</div>' +
          '<div class="chat-assistant">Karma: ' + esc(c.assistant).slice(0, 300) + '</div>' +
          '</div>';
      }).join('');
    }
  } catch (e) {
    ERR.textContent = 'Load failed: ' + e.message;
    ERR.style.display = 'block';
  }
}

load();
setInterval(load, 30000);
</script>
</body></html>
