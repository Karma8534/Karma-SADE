<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma SADE Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #151b2d;
            --bg-card: #1a2332;
            --bg-hover: #222b3f;
            --border-color: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --status-healthy: #10b981;
            --status-warning: #f59e0b;
            --status-critical: #ef4444;
            --status-info: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1425 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.healthy { background: rgba(16, 185, 129, 0.2); color: var(--status-healthy); }
        .status-badge.warning { background: rgba(245, 158, 11, 0.2); color: var(--status-warning); }
        .status-badge.critical { background: rgba(239, 68, 68, 0.2); color: var(--status-critical); }

        .header-meta {
            display: flex;
            gap: 24px;
            align-items: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-healthy);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-icon {
            font-size: 24px;
        }

        .service-item, .task-item, .watchdog-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: background 0.2s;
        }

        .service-item:hover, .task-item:hover, .watchdog-item:hover {
            background: var(--bg-hover);
        }

        .service-item.healthy { border-left-color: var(--status-healthy); }
        .service-item.down { border-left-color: var(--status-critical); }
        .task-item.ready { border-left-color: var(--status-healthy); }
        .task-item.issue { border-left-color: var(--status-warning); }
        .watchdog-item.healthy { border-left-color: var(--status-healthy); }
        .watchdog-item.failing { border-left-color: var(--status-warning); }
        .watchdog-item.gave-up { border-left-color: var(--status-critical); }

        .item-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .item-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.healthy { background: var(--status-healthy); }
        .status-dot.warning { background: var(--status-warning); }
        .status-dot.critical { background: var(--status-critical); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .logs-section {
            grid-column: 1 / -1;
        }

        .log-viewer {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
        }

        .log-line.error {
            color: var(--status-critical);
        }

        .log-line.warn {
            color: var(--status-warning);
        }

        .log-line.ok {
            color: var(--status-healthy);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-purple);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--status-critical);
            border-radius: 8px;
            padding: 16px;
            color: var(--status-critical);
            margin: 20px 0;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .nav-tab {
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .nav-tab.active {
            background: var(--bg-card);
            color: var(--accent-purple);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-purple);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-title">
                <h1>⚡ Karma SADE Dashboard</h1>
                <span class="status-badge" id="overall-status">Loading...</span>
            </div>
            <div class="header-meta">
                <div class="refresh-indicator">
                    <span class="refresh-dot"></span>
                    <span id="last-update">Loading...</span>
                </div>
                <span id="current-time"></span>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('overview')">📊 Overview</button>
        <button class="nav-tab" onclick="switchTab('services')">🔧 Services</button>
        <button class="nav-tab" onclick="switchTab('tasks')">📅 Tasks</button>
        <button class="nav-tab" onclick="switchTab('logs')">📝 Logs</button>
    </div>

    <div id="overview-tab" class="tab-content active">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Connecting to Cockpit...</p>
        </div>

        <div id="error" style="display: none;"></div>

        <div id="dashboard-content" style="display: none;">
            <div class="grid">
                <!-- Services Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Services</span>
                        <span class="card-icon">🔧</span>
                    </div>
                    <div id="services-list"></div>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="refreshDashboard()">🔄 Refresh</button>
                        <button class="btn btn-secondary" onclick="switchTab('services')">📋 Details</button>
                    </div>
                </div>

                <!-- Watchdog Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Watchdog</span>
                        <span class="card-icon">🐕</span>
                    </div>
                    <div id="watchdog-list"></div>
                    <div class="stat-grid" id="watchdog-stats" style="margin-top: 16px;"></div>
                </div>

                <!-- Scheduled Tasks Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Scheduled Tasks</span>
                        <span class="card-icon">📅</span>
                    </div>
                    <div id="tasks-list"></div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="switchTab('tasks')">📋 All Tasks</button>
                    </div>
                </div>

                <!-- Backups Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Backups</span>
                        <span class="card-icon">💾</span>
                    </div>
                    <div id="backup-info"></div>
                </div>

                <!-- Secrets Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Secrets Management</span>
                        <span class="card-icon">🔐</span>
                    </div>
                    <div id="secrets-info"></div>
                </div>

                <!-- Quick Actions Card -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Quick Actions</span>
                        <span class="card-icon">⚡</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="openEndpoint('/dashboard')">📊 Full JSON</button>
                        <button class="btn btn-secondary" onclick="openEndpoint('/health')">❤️ Health</button>
                        <button class="btn btn-secondary" onclick="switchTab('logs')">📝 Logs</button>
                        <button class="btn btn-secondary" onclick="openExternal('http://localhost:8080')">🌐 Open WebUI</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="services-tab" class="tab-content">
        <div class="grid">
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <span class="card-title">Service Details</span>
                    <span class="card-icon">🔧</span>
                </div>
                <div id="services-detail"></div>
            </div>
        </div>
    </div>

    <div id="tasks-tab" class="tab-content">
        <div class="grid">
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <span class="card-title">Scheduled Tasks</span>
                    <span class="card-icon">📅</span>
                </div>
                <div id="tasks-detail"></div>
            </div>
        </div>
    </div>

    <div id="logs-tab" class="tab-content">
        <div class="grid logs-section">
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <span class="card-title">Recent Logs</span>
                    <span class="card-icon">📝</span>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="loadLogs('karma-watchdog.log')">🐕 Watchdog</button>
                    <button class="btn btn-secondary" onclick="loadLogs('karma-startup.log')">🚀 Startup</button>
                    <button class="btn btn-secondary" onclick="loadLogs('karma-backup.log')">💾 Backup</button>
                    <button class="btn btn-secondary" onclick="loadLogs('cockpit-service.log')">🔧 Cockpit</button>
                    <button class="btn btn-secondary" onclick="loadLogs('sentinel-runtime.log')">👁️ Sentinel</button>
                </div>
                <div class="log-viewer" id="log-viewer" style="margin-top: 16px;">
                    <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        Select a log file above to view
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:9400';
        let currentData = null;
        let autoRefresh = true;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            loadDashboard();
            setInterval(() => {
                if (autoRefresh) loadDashboard();
            }, 30000); // Refresh every 30 seconds
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString();
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');

            // Load tab-specific content
            if (tabName === 'services' && currentData) {
                renderServicesDetail(currentData.services);
            } else if (tabName === 'tasks' && currentData) {
                renderTasksDetail(currentData.scheduled_tasks);
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                currentData = await response.json();
                renderDashboard(currentData);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';

                const now = new Date();
                document.getElementById('last-update').textContent = `Updated ${now.toLocaleTimeString()}`;
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <div class="error-message">
                        <strong>⚠️ Connection Error</strong><br>
                        Could not connect to Cockpit API at ${API_BASE}<br>
                        <small>${error.message}</small><br><br>
                        <button class="btn btn-primary" onclick="loadDashboard()">🔄 Retry</button>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            // Overall status
            const statusBadge = document.getElementById('overall-status');
            statusBadge.textContent = data.overall || 'unknown';
            statusBadge.className = 'status-badge ' + (data.overall || 'warning');

            // Services
            renderServices(data.services);

            // Watchdog
            renderWatchdog(data.watchdog);

            // Tasks
            renderTasks(data.scheduled_tasks);

            // Backups
            renderBackups(data.backups);

            // Secrets
            renderSecrets(data.secrets);
        }

        function renderServices(services) {
            const container = document.getElementById('services-list');
            if (!services) {
                container.innerHTML = '<p style="color: var(--text-secondary);">No service data</p>';
                return;
            }

            let html = '';
            for (const [name, info] of Object.entries(services)) {
                const status = info.status || 'unknown';
                const statusClass = status === 'healthy' ? 'healthy' : 'down';
                const icon = status === 'healthy' ? '✓' : '✗';
                const dotClass = status === 'healthy' ? 'healthy' : 'critical';

                html += `
                    <div class="service-item ${statusClass}">
                        <span class="item-name">${icon} ${name}</span>
                        <div class="item-status">
                            <span class="status-dot ${dotClass}"></span>
                            <span>${status.toUpperCase()}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function renderServicesDetail(services) {
            const container = document.getElementById('services-detail');
            if (!services) {
                container.innerHTML = '<p style="color: var(--text-secondary);">No service data</p>';
                return;
            }

            let html = '';
            for (const [name, info] of Object.entries(services)) {
                const status = info.status || 'unknown';
                const statusClass = status === 'healthy' ? 'healthy' : 'down';

                html += `
                    <div class="service-item ${statusClass}" style="margin-bottom: 16px;">
                        <div>
                            <div class="item-name">${name}</div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                                URL: ${info.url || 'N/A'}<br>
                                ${info.code ? `Status Code: ${info.code}` : ''}
                                ${info.error ? `Error: ${info.error}` : ''}
                            </div>
                        </div>
                        <div class="item-status">
                            <span class="status-dot ${status === 'healthy' ? 'healthy' : 'critical'}"></span>
                            <span>${status.toUpperCase()}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function renderWatchdog(watchdog) {
            const container = document.getElementById('watchdog-list');
            const statsContainer = document.getElementById('watchdog-stats');

            if (!watchdog || watchdog.status !== 'ok') {
                container.innerHTML = '<p style="color: var(--text-secondary);">Watchdog not running</p>';
                return;
            }

            const summary = watchdog.summary;
            let html = '';

            for (const [name, info] of Object.entries(summary.details || {})) {
                const status = info.status || 'unknown';
                const statusClass = status === 'healthy' ? 'healthy' : (status === 'gave_up' ? 'gave-up' : 'failing');
                const icon = status === 'healthy' ? '✓' : (status === 'gave_up' ? '✗' : '⚠');
                const dotClass = status === 'healthy' ? 'healthy' : (status === 'gave_up' ? 'critical' : 'warning');

                html += `
                    <div class="watchdog-item ${statusClass}">
                        <span class="item-name">${icon} ${name}</span>
                        <div class="item-status">
                            <span class="status-dot ${dotClass}"></span>
                            <span>${status.toUpperCase()}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;

            // Stats
            statsContainer.innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">Healthy</div>
                    <div class="stat-value" style="color: var(--status-healthy);">${summary.healthy_services || 0}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Failed</div>
                    <div class="stat-value" style="color: var(--status-warning);">${summary.failed_services || 0}</div>
                </div>
            `;
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasks-list');

            if (!tasks || tasks.status === 'error') {
                container.innerHTML = '<p style="color: var(--text-secondary);">Could not load tasks</p>';
                return;
            }

            const taskList = tasks.tasks || [];
            let html = '';

            taskList.slice(0, 4).forEach(task => {
                const healthy = task.healthy !== false;
                const statusClass = healthy ? 'ready' : 'issue';
                const icon = healthy ? '✓' : '⚠';
                const dotClass = healthy ? 'healthy' : 'warning';
                const name = (task.name || '').replace('KarmaSADE-', '');

                html += `
                    <div class="task-item ${statusClass}">
                        <span class="item-name">${icon} ${name}</span>
                        <div class="item-status">
                            <span class="status-dot ${dotClass}"></span>
                            <span>${task.state || 'Unknown'}</span>
                        </div>
                    </div>
                `;
            });

            if (taskList.length > 4) {
                html += `<div style="text-align: center; margin-top: 12px; color: var(--text-secondary); font-size: 13px;">
                    +${taskList.length - 4} more tasks
                </div>`;
            }

            container.innerHTML = html || '<p style="color: var(--text-secondary);">No tasks found</p>';
        }

        function renderTasksDetail(tasks) {
            const container = document.getElementById('tasks-detail');

            if (!tasks || tasks.status === 'error') {
                container.innerHTML = '<p style="color: var(--text-secondary);">Could not load tasks</p>';
                return;
            }

            const taskList = tasks.tasks || [];
            let html = '';

            taskList.forEach(task => {
                const healthy = task.healthy !== false;
                const statusClass = healthy ? 'ready' : 'issue';
                const name = (task.name || '').replace('KarmaSADE-', '');

                html += `
                    <div class="task-item ${statusClass}" style="margin-bottom: 16px;">
                        <div>
                            <div class="item-name">${name}</div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                                State: ${task.state || 'Unknown'}<br>
                                ${task.last_run ? `Last Run: ${new Date(task.last_run).toLocaleString()}` : 'Never run'}<br>
                                Last Result: ${task.last_result === 0 ? 'Success' : 'Error ' + task.last_result}
                            </div>
                        </div>
                        <div class="item-status">
                            <span class="status-dot ${healthy ? 'healthy' : 'warning'}"></span>
                            <span>${task.state || 'Unknown'}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<p style="color: var(--text-secondary);">No tasks found</p>';
        }

        function renderBackups(backups) {
            const container = document.getElementById('backup-info');

            if (!backups || backups.status === 'no_backups') {
                container.innerHTML = `
                    <div class="stat-item" style="background: rgba(239, 68, 68, 0.1);">
                        <div class="stat-label">Status</div>
                        <div class="stat-value" style="color: var(--status-critical);">No Backups</div>
                    </div>
                `;
                return;
            }

            if (backups.status === 'ok') {
                const recent = backups.most_recent;
                const stale = recent.stale;

                container.innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-label">Latest</div>
                            <div class="stat-value" style="font-size: 14px;">${recent.age_hours}h ago</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Size</div>
                            <div class="stat-value">${recent.size_mb} MB</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Total</div>
                            <div class="stat-value">${backups.total_backups}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Status</div>
                            <div class="stat-value" style="color: ${stale ? 'var(--status-warning)' : 'var(--status-healthy)'};">
                                ${stale ? 'Stale' : 'Fresh'}
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 12px; font-size: 12px; color: var(--text-secondary);">
                        ${recent.file}
                    </div>
                `;
            }
        }

        function renderSecrets(secrets) {
            const container = document.getElementById('secrets-info');

            if (!secrets) {
                container.innerHTML = '<p style="color: var(--text-secondary);">No data</p>';
                return;
            }

            const configured = secrets.status === 'configured';

            container.innerHTML = `
                <div class="stat-item" style="background: ${configured ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'};">
                    <div class="stat-label">Status</div>
                    <div class="stat-value" style="color: ${configured ? 'var(--status-healthy)' : 'var(--status-critical)'};">
                        ${configured ? '✓ Configured' : '✗ Not Configured'}
                    </div>
                </div>
                ${configured ? `
                    <div style="margin-top: 12px;">
                        <div class="stat-label">Keys Stored</div>
                        <div class="stat-value">${secrets.key_count || 0}</div>
                    </div>
                ` : `
                    <div style="margin-top: 12px; font-size: 13px; color: var(--status-warning);">
                        ⚠️ API keys may be in plaintext
                    </div>
                `}
            `;
        }

        async function loadLogs(logFile) {
            const viewer = document.getElementById('log-viewer');
            viewer.innerHTML = '<div style="text-align: center; padding: 20px;"><div class="spinner"></div>Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/logs/${logFile}?lines=50`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (data.status === 'ok' && data.lines) {
                    let html = '';
                    data.lines.forEach(line => {
                        let className = 'log-line';
                        if (line.includes('[ERROR]') || line.includes('[CRITICAL]')) {
                            className += ' error';
                        } else if (line.includes('[WARN]')) {
                            className += ' warn';
                        } else if (line.includes('[OK]')) {
                            className += ' ok';
                        }
                        html += `<div class="${className}">${escapeHtml(line)}</div>`;
                    });
                    viewer.innerHTML = html || '<div style="text-align: center; color: var(--text-secondary);">No log entries</div>';
                } else {
                    viewer.innerHTML = `<div style="text-align: center; color: var(--text-secondary);">${data.status === 'no_file' ? 'Log file not found' : 'Error loading logs'}</div>`;
                }
            } catch (error) {
                viewer.innerHTML = `<div style="text-align: center; color: var(--status-critical);">Error: ${error.message}</div>`;
            }
        }

        function openEndpoint(path) {
            window.open(`${API_BASE}${path}`, '_blank');
        }

        function openExternal(url) {
            window.open(url, '_blank');
        }

        function refreshDashboard() {
            loadDashboard();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
