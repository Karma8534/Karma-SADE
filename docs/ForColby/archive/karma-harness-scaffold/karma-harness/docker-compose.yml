version: "3.9"

# ============================================================
# KARMA HARNESS — Docker Compose
# Dev target: http://localhost
# Prod target: hub.arknexus.net (deploy later)
# ============================================================

networks:
  karma-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  sandbox-workspace:
  self-edit-proposals:
  self-edit-applied:
  self-edit-rejected:
  persona-vault:

services:

  # ----------------------------------------------------------
  # POSTGRES + pgvector — persistent memory store
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: karma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: karma
      POSTGRES_USER: karma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./memory/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - karma-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karma -d karma"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # REDIS — session cache, router state, self-edit queue
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: karma-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - karma-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # BACKEND — FastAPI: smart router, persona, memory, self-edit
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karma-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://karma:${POSTGRES_PASSWORD}@postgres:5432/karma
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SANDBOX_URL=http://sandbox:8888
    volumes:
      - ./backend:/app
      - ./persona:/app/persona
      - ./self-edit:/app/self-edit
      - self-edit-proposals:/app/self-edit/proposals
      - self-edit-applied:/app/self-edit/applied
      - self-edit-rejected:/app/self-edit/rejected
      - persona-vault:/app/persona/vault
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - karma-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FRONTEND — Next.js 14: unified Chat+Cowork+Code UI
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: karma-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_WS_URL=ws://localhost/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - karma-net

  # ----------------------------------------------------------
  # SANDBOX — isolated Docker exec container for code running
  # ----------------------------------------------------------
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: karma-sandbox
    restart: unless-stopped
    environment:
      - SANDBOX_TOKEN=${SANDBOX_TOKEN}
    volumes:
      - sandbox-workspace:/workspace
    ports:
      - "8888:8888"
    networks:
      - karma-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  # ----------------------------------------------------------
  # NGINX — reverse proxy, single entry point on :80
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: karma-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - karma-net
