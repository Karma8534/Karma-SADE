<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', monospace; background: #0a0a0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px; border-bottom: 1px solid #222; }
    .title { color: #7c3aed; font-size: 16px; letter-spacing: 6px; font-weight: 300; }
    .sub { color: #666; font-size: 9px; letter-spacing: 2px; margin-top: 2px; }
    .chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 10px; border-radius: 4px; font-size: 11px; max-width: 90%; white-space: pre-wrap; }
    .msg.user { background: #111; border: 1px solid #333; align-self: flex-end; }
    .msg.karma { background: #111; border: 1px solid #7c3aed30; align-self: flex-start; }
    .msg .role { font-size: 9px; color: #7c3aed; margin-bottom: 2px; letter-spacing: 1px; }
    .input-area { padding: 8px 12px; border-top: 1px solid #222; display: flex; gap: 4px; }
    input { flex: 1; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 8px; font-size: 12px; font-family: inherit; outline: none; }
    input:focus { border-color: #7c3aed; }
    button { background: #7c3aed; color: white; border: none; padding: 8px 16px; font-size: 11px; letter-spacing: 2px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">KARMA</div>
    <div class="sub">SIDE PANEL . ALWAYS PRESENT</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Message Karma..." />
    <button id="send">SEND</button>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<div class="role">' + role.toUpperCase() + '</div>' + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    send.addEventListener('click', () => {
      const q = input.value.trim();
      if (!q) return;
      addMsg('user', q);
      input.value = '';
      addMsg('karma', 'Thinking...');
      chrome.runtime.sendMessage({ type: 'QUERY_KARMA', query: q }, (res) => {
        chat.lastChild.remove(); // remove "thinking"
        if (res && res.ok !== false) {
          addMsg('karma', res.assistant_text || res.response || JSON.stringify(res));
        } else {
          addMsg('karma', 'Error: ' + (res?.error || 'unknown'));
        }
      });
    });

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send.click(); });

    // Greeting
    addMsg('karma', 'Karma here. Always present. Ask me anything.');
  </script>
</body>
</html>
