<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: 'SF Mono', monospace; background: #0a0a0f; color: #e0e0e0; padding: 12px; }
    .header { color: #7c3aed; font-size: 14px; letter-spacing: 4px; font-weight: 300; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 9px; letter-spacing: 2px; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 11px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.ok { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .dot.err { background: #ef4444; }
    .input-row { display: flex; gap: 4px; margin-top: 8px; }
    input { flex: 1; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 6px 8px; font-size: 11px; font-family: inherit; outline: none; }
    input:focus { border-color: #7c3aed; }
    button { background: #7c3aed; color: white; border: none; padding: 6px 12px; font-size: 10px; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
    button:hover { background: #6d28d9; }
    .btn-secondary { background: transparent; border: 1px solid #333; color: #999; }
    .btn-secondary:hover { border-color: #7c3aed; color: #7c3aed; }
    .result { margin-top: 8px; font-size: 10px; color: #999; max-height: 120px; overflow-y: auto; padding: 6px; background: #111; border: 1px solid #222; }
    .actions { display: flex; gap: 4px; margin-top: 8px; }
    #token-section { margin-top: 8px; font-size: 10px; }
    #token-section input { font-size: 10px; }
  </style>
</head>
<body>
  <div class="header">KARMA</div>
  <div class="subtitle">NEXUS BROWSER INTEGRATION</div>

  <div class="status">
    <div class="dot" id="hub-dot"></div>
    <span id="hub-status">checking...</span>
  </div>

  <div class="input-row">
    <input type="text" id="query" placeholder="Ask Karma..." />
    <button id="send">ASK</button>
  </div>

  <div class="actions">
    <button class="btn-secondary" id="capture">CAPTURE PAGE</button>
    <button class="btn-secondary" id="open-hub">OPEN HUB</button>
  </div>

  <div class="result" id="result" style="display:none"></div>

  <div id="token-section">
    <input type="password" id="token" placeholder="Hub token (paste once)" />
    <button class="btn-secondary" id="save-token" style="margin-top:4px">SAVE TOKEN</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
